<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NYC Eagles Broadcast Overlay</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://js.pusher.com/8.2/pusher.min.js"></script>

    <style>
        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Juralight-LmrZ.ttf') format('truetype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Jurabook-dvpK.ttf') format('truetype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Juramedium-Xdgd.ttf') format('truetype');
            font-weight: 500;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Jurademibold-Povr.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'Eurostile';
            src: url('assets/fonts/Eurostile-Medium Medium.ttf') format('truetype');
            font-weight: 500;
        }

        :root {
            --espn-primary: #2563eb;
            --espn-glow: rgba(37,99,235,0.8);
            --z-scoreboard: 100;
            --z-overlay: 500;
            --z-fullscreen: 2000;
        }

        html, body {
            margin: 0;
            width: 1920px;
            height: 1080px;
            background: transparent;
            overflow: hidden;
            font-family: 'Eurostile', 'Roboto', Arial, sans-serif;
        }

        /* CONNECTION DOT */
        #connectionDot {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #facc15;
            z-index: 9999;
        }

        /* LOWER THIRD */
        #lowerThird {
            position: absolute;
            left: 60px;
            bottom: 200px; /* 🔥 final ESPN height */

            opacity: 0;
            transform: translateX(-120%);
            transition: all .5s cubic-bezier(.22,.9,.3,1);
        }

            #lowerThird,
            #lowerThird * {
                font-family: 'Oswald', 'Eurostile', sans-serif !important;
            }

        /* ===== LOWER THIRD - ESPN SYSTEM ===== */

        .lt-card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 18px 10px 12px;
            width: fit-content;
            max-width: 540px;
            background: linear-gradient(90deg,#020617 0%, #0f172a 60%, #111827 100%);
            border-radius: 6px;
            border-left: 5px solid var(--espn-primary);
            box-shadow: 0 6px 20px rgba(0,0,0,.6), inset 0 0 12px rgba(255,255,255,0.05);
            overflow: hidden;
        }

            .lt-card::before {
                content: "";
                position: absolute;
                left: -100%;
                top: 0;
                height: 100%;
                width: 100%;
                background: linear-gradient( 90deg, transparent, rgba(255,255,255,0.08), transparent );
            }

            /* TRIGGER WIPE */
            .lt-card.animate::before {
                animation: ltWipe .7s ease forwards;
            }

        @keyframes ltWipe {
            from {
                left: -100%;
            }

            to {
                left: 100%;
            }
        }

        .lt-card.show img {
            animation: playerPop .4s ease forwards;
        }

        @keyframes playerPop {
            from {
                transform: scale(.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Accent bar */
        .lt-accent {
            width: 6px;
            height: 100%;
            background: linear-gradient(var(--espn-primary), #1e40af);
        }

        /* Content block */
        .lt-content {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .lt-team {
            font-size: 10px;
            font-weight: 700;
            color: #93c5fd;
            letter-spacing: 1.2px;
        }

        .lt-name {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .lt-role {
            font-size: 12px;
            font-weight: 700;
            color: #cbd5f5;
        }

        .lt-extra {
            font-size: 11px;
            color: #94a3b8;
        }

        #photoMask {
            position: absolute;
            width: 87px;
            height: 87px;
            left: 40px;
            top: 138px;
            border-radius: 50%;
            overflow: hidden;
        }

        #playerImage {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            display: none;
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px var(--espn-primary), 0 0 10px var(--espn-glow);
            transform: scale(.85);
            opacity: 0;
        }

        @keyframes playerIn {
            0% {
                opacity: 0;
                transform: scale(.7);
            }

            60% {
                opacity: 1;
                transform: scale(1.08);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes playerPulse {
            0% {
                box-shadow: 0 0 0 2px var(--espn-primary), 0 0 12px var(--espn-glow), 0 0 25px var(--espn-glow);
            }

            50% {
                box-shadow: 0 0 0 3px var(--espn-primary), 0 0 18px var(--espn-glow), 0 0 35px var(--espn-glow);
            }

            100% {
                box-shadow: 0 0 0 2px var(--espn-primary), 0 0 12px var(--espn-glow), 0 0 25px var(--espn-glow);
            }
        }


        #separator {
            position: absolute;
            left: 140px;
            top: 195px;
            width: 300px;
            height: 2px;
            background: rgba(255,255,255,.6);
        }

        /* ================ Bowler Lower Third ============== */
        #bowlerLowerThird::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(56,189,248,.25);
            opacity: 0;
            transition: opacity .4s ease;
        }

        #bowlerLowerThird {
            position: absolute;
            bottom: 240px;
            right: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 14px 18px;
            width: fit-content;
            max-width: 420px;
            background: linear-gradient(90deg,#020617 0%, #0f172a 60%, #111827 100%);
            border-radius: 6px;
            border-left: 5px solid #38bdf8;
            box-shadow: 0 6px 20px rgba(0,0,0,.6), inset 0 0 12px rgba(255,255,255,0.05);
            opacity: 0;
            transform: translateX(120%);
            transition: all .5s cubic-bezier(.22,.9,.3,1);
            z-index: var(--z-overlay);
        }

        @keyframes bowlerIn {
            0% {
                transform: translateX(120%) scale(.9);
                opacity: 0;
            }

            60% {
                transform: translateX(-10px) scale(1.03);
                opacity: 1;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        .bowler-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            text-align: center;
        }

        #bowlerTeam {
            font-size: 10px;
            font-weight: 700;
            color: #7dd3fc;
            letter-spacing: 1.2px;
            margin-top: 6px;

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }

        #bowlerLabel {
            font-size: 11px;
            font-weight: 800;
            color: #38bdf8;
            letter-spacing: 2px;
        }

        #bowlerCardName {
            font-size: 22px;
            font-weight: 900;
            color: #ffffff;
        }

        #bowlerCardStats {
            font-size: 12px;
            color: #cbd5f5;

            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }

        #bowlerLowerThird.show img {
            animation: playerPop .4s ease forwards;
        }

        #bowlerImage {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            display: none;
            margin: 0 auto;
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px #38bdf8, 0 0 10px rgba(56,189,248,0.7);
            transform: scale(.85);
            opacity: 0;
        }

        /* ================= MOMENT STINGER ================= */

        #momentStinger {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent; /* fully transparent */
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s ease;
            z-index: var(--z-overlay);
        }

        #momentGlow {
            position: absolute;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            filter: blur(160px);
            opacity: .75; /* stronger for daylight */
            transform: scale(.6);
            transition: transform .4s ease;
        }

        #momentImage {
            max-width: 1200px;
            width: 75%;
            transform: scale(.4);
            opacity: 0;
            z-index: 2;
        }

        #momentFallback {
            position: absolute;
            font-size: 200px;
            font-weight: 700;
            letter-spacing: .1em;
            display: none;
            z-index: 2;
            font-family: 'Oswald', sans-serif;
        }

        /* Animations */
        /* ENTRY ANIMATION */
        @keyframes momentIn {
            0% {
                transform: scale(.4);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* EXIT ANIMATION */
        @keyframes momentOut {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(.6);
                opacity: 0;
            }
        }


        /* WICKET SHAKE */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-12px);
            }

            40% {
                transform: translateX(12px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* ================= LEAGUE BUG (ALWAYS ON) ================= */

        #leagueBug {
            position: absolute;
            top: 60px;
            right: 80px;
            padding: 0;
            background: transparent;
            backdrop-filter: none;
            border-radius: 4px;
            z-index: 9000;
            opacity: 0;
            transform: translateX(40px);
            transition: all .6s cubic-bezier(.22,.9,.3,1);
        }

        #leagueLogo {
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
        }

        #leagueBug.show {
            opacity: 0.8;
            transform: translateX(0);
        }

        #leagueText {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
        }

        #tournamentText {
            font-size: 14px;
            color: #e5e7eb;
            text-transform: uppercase;
        }

        #scoreFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            border: none;
            display: none;
            z-index: 1;
        }

        /* ================= TOP SPONSOR BAR ================= */

        #topSponsorBar {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 140px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(-100%);
            transition: transform .6s cubic-bezier(.22,.9,.3,1), opacity .4s ease;
            z-index: 10000;
        }

            #topSponsorBar.show {
                opacity: 1;
                transform: translateY(0);
            }

        #topSponsorImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ================= SKY STYLE SCOREBOARD ================= */

        #scoreboard {
            position: absolute;
            bottom: 45px;
            left: 50%;
            transform: translate(-50%,140%);
            width: 1720px;
            height: 108px;
            background: linear-gradient( 90deg, rgba(6,12,28,.90), rgba(15,23,42,.92) );
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px 0 0;
            color: white;
            z-index: var(--z-scoreboard);
            transition: transform .6s ease, opacity .3s ease;
            box-shadow: 0 8px 30px rgba(0,0,0,.6);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.05), inset 0 -1px 0 rgba(0,0,0,.4);
        }

            #scoreboard.show {
                transform: translate(-50%,0);
            }

        /* TEAM BLOCKS */

        #sbTeamA, #sbTeamB {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 300px;
            max-width: 340px;
            flex-shrink: 0;
            height: 100%;
        }

        #sbTeamB {
            justify-content: flex-end;
        }

        #logoA, #logoB {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        #nameA, #nameB {
            font-size: 22px;
            line-height: 24px;
            font-weight: 700;
            letter-spacing: .5px;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: rgba(255,255,255,.94);
            flex: 1;
            display: flex;
            align-items: center;
            height: 32px;
            padding-top: 2px;
        }

        /* SCORE CENTER */

        #sbScoreBlock {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 200px;
            max-width: 200px;
            flex-shrink: 0;
            gap: 5px;
            padding-right: 22px;
            margin-right: 10px;
            padding-top: 8px;
            padding-bottom: 8px;
            border-right: 1px solid rgba(255,255,255,.05);
        }

        #sbScore {
            font-family: 'Oswald', sans-serif;
            font-size: 40px;
            line-height: 40px;
            font-weight: 700;
            letter-spacing: 0;
            color: rgba(255,255,255,.98);
            filter: drop-shadow(0 0 6px rgba(255,255,255,.06));
        }

        #sbOvers {
            font-size: 17px;
            line-height: 19px;
            color: rgba(255,255,255,.96);
            font-weight: 700;
            text-shadow: 0 0 8px rgba(255,255,255,.10);
        }

        #sbRR {
            font-size: 15px;
            line-height: 17px;
            color: rgba(255,255,255,.82);
            font-weight: 600;
        }

        /* BATTERS */

        #sbBatters {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            font-size: 17px;
            width: 340px;
            flex-shrink: 0;
        }

        .batRow {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
            line-height: 26px;
        }

            .batRow span:first-child {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                font-weight: 600;
            }

        #bat1Score,
        #bat2Score {
            font-weight: 700;
            color: rgba(255,255,255,.97);
        }

        /* BOWLER */

        #sbBowler {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 8px;
            font-size: 15px;
            text-align: right;
            min-width: 150px;
            max-width: 150px;
            flex-shrink: 0;
            padding-top: 6px;
        }

        #bowlerName {
            font-weight: 700;
            line-height: 18px;
            text-transform: uppercase;
        }

        #bowlerStats {
            color: rgba(255,255,255,.90);
            font-size: 15px;
            line-height: 17px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* THIS OVER */

        #sbThisOver {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-width: 230px;
            max-width: 230px;
            flex-shrink: 0;
        }

        #thisOverLabel {
            font-size: 13px;
            line-height: 13px;
            color: rgba(255,255,255,.86);
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 0;
            transform: translateY(-7px);
            text-transform: uppercase;
        }

        #thisOverBalls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            flex-wrap: nowrap;
            white-space: nowrap;
            transform: translateY(4px);
        }

        /* BALLS */
        .ball {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            min-width: 24px;
            border-radius: 50%;
            font-size: 11px;
            font-weight: 700;
            background: #334155;
            color: white;
            transition: transform .2s ease, box-shadow .2s ease;
            box-shadow: inset 0 1px 2px rgba(255,255,255,.06), 0 0 8px rgba(0,0,0,.18);
        }

            .ball.four {
                background: var(--espn-primary);
            }

            .ball.six {
                background: #16a34a;
            }

            .ball.wicket {
                background: #dc2626;
            }

            .ball.extra {
                background: #7c3aed;
            }

        .lastBall {
            transform: scale(1.20);
            box-shadow: 0 0 6px #facc15;
        }

        .scoreFlash {
            animation: scoreFlash .35s ease;
        }

        @keyframes scoreFlash {
            0% {
                transform: scale(1.15);
                color: #facc15;
            }

            100% {
                transform: scale(1);
                color: white;
            }
        }

        /* TEAM COLOR ACCENT */
        .teamAColor {
            border-top: 4px solid var(--espn-primary);
        }

        .teamBColor {
            border-bottom: 4px solid #dc2626;
        }

        .boundaryGlow {
            box-shadow: 0 0 40px rgba(250,204,21,0.8), inset 0 0 20px rgba(250,204,21,0.4);
        }

        .teamBColor {
            border-top: 4px solid #dc2626;
        }

        /* STRIKE STAR ANIMATION */

        .strikeStar {
            color: #facc15;
            margin-left: 4px;
            transition: all .35s ease;
        }

        .strikeMove {
            animation: strikeMove .35s ease;
        }

        @keyframes strikeMove {
            0% {
                transform: translateX(-6px);
                opacity: .3;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* ================= BATTING TEAM HIGHLIGHT ================= */
        .battingHighlight {
            position: relative;
            background: linear-gradient( 90deg, rgba(37,99,235,.40) 0%, rgba(37,99,235,.62) 50%, rgba(37,99,235,.40) 100% );
            padding: 8px 18px;
            border-radius: 0 8px 8px 0;
            border-right: 1px solid rgba(147,197,253,.25);
            box-shadow: inset 0 0 20px rgba(255,255,255,.04), 0 0 24px rgba(37,99,235,.16);
            transition: all .35s ease;
            overflow: hidden;
            animation: battingPulse 2.8s ease-in-out infinite;
        }

            /* animated shine sweep */
            .battingHighlight::before {
                content: "";
                position: absolute;
                top: 0;
                left: -120%;
                width: 70%;
                height: 100%;
                background: linear-gradient( 90deg, transparent, rgba(255,255,255,.18), transparent );
                transform: skewX(-20deg);
                animation: battingSweep 3.5s linear infinite;
            }

            /* glowing active team text */
            .battingHighlight span {
                color: #ffffff;
                text-shadow: 0 0 8px rgba(255,255,255,.15), 0 0 14px rgba(147,197,253,.25);
            }

            /* logo glow */
            .battingHighlight img {
                filter: drop-shadow(0 0 4px rgba(255,255,255,.35)) drop-shadow(0 0 10px rgba(37,99,235,.35));
            }

        /* subtle pulsing */
        @keyframes battingPulse {
            0% {
                box-shadow: 0 0 18px rgba(37,99,235,.18), inset 0 0 12px rgba(255,255,255,.04);
            }

            50% {
                box-shadow: 0 0 26px rgba(37,99,235,.30), inset 0 0 18px rgba(255,255,255,.07);
            }

            100% {
                box-shadow: 0 0 18px rgba(37,99,235,.18), inset 0 0 12px rgba(255,255,255,.04);
            }
        }

        /* moving sheen */
        @keyframes battingSweep {
            0% {
                left: -120%;
            }

            100% {
                left: 140%;
            }
        }

        #runworm {
            position: absolute;
            bottom: 160px;
            left: 60px;
            width: 320px;
            height: 120px;
            background: rgba(0,0,0,.5);
            border-radius: 6px;
            padding: 10px;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            z-index: 8000
        }

        #runworm {
            display: none;
        }

        .wormBar {
            flex: 1;
            background: #38bdf8;
            border-radius: 3px;
            min-height: 8px;
        }

        #wicketGraphic {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translate(-50%,40px);
            background: #7f1d1d;
            border-left: 6px solid #ef4444;
            padding: 14px 28px;
            border-radius: 6px;
            color: white;
            text-align: center;
            opacity: 0;
            transition: all .45s cubic-bezier(.22,.9,.3,1);
            z-index: 9500;
        }

            #wicketGraphic.show {
                opacity: 1;
                transform: translate(-50%,0);
            }

        #wicketText {
            font-size: 14px;
            letter-spacing: 2px;
            color: #fca5a5;
        }

        #wicketPlayer {
            font-size: 28px;
            font-weight: 700;
        }

        #wicketScore {
            font-size: 16px;
            color: #fecaca;
        }

        #partnershipGraphic {
            position: absolute;
            bottom: 210px;
            left: 50%;
            transform: translate(-50%,40px);
            background: #020617;
            border-left: 6px solid #38bdf8;
            padding: 14px 28px;
            border-radius: 6px;
            color: white;
            text-align: center;
            opacity: 0;
            transition: all .45s cubic-bezier(.22,.9,.3,1);
            z-index: 9500;
        }

            #partnershipGraphic.show {
                opacity: 1;
                transform: translate(-50%,0);
            }

        #partnershipTitle {
            font-size: 12px;
            letter-spacing: 2px;
            color: #cbd5f5;
        }

        #partnershipRuns {
            font-size: 28px;
            font-weight: 700;
        }

        #partnershipBalls {
            font-size: 16px;

    <script>

        const PUSHER_KEY = "12fcceaea77e52cf3626";
        const pusher = new Pusher(PUSHER_KEY, { cluster: 'us2', forceTLS: true });
        const channel = pusher.subscribe('broadcast');

        const logoA = document.getElementById("logoA");
        const logoB = document.getElementById("logoB");
        const nameA = document.getElementById("nameA");
        const nameB = document.getElementById("nameB");
        const sbTeamA = document.getElementById("sbTeamA");
        const sbTeamB = document.getElementById("sbTeamB");

        const sbScore = document.getElementById("sbScore");
        const sbOvers = document.getElementById("sbOvers");
        const sbRR = document.getElementById("sbRR");
        const bat1 = document.getElementById("bat1");
        const bat1Score = document.getElementById("bat1Score");
        const bat2 = document.getElementById("bat2");
        const bat2Score = document.getElementById("bat2Score");

        const bowlerName = document.getElementById("bowlerName");
        const bowlerStats = document.getElementById("bowlerStats");
        const bowlerLabel = document.getElementById("bowlerLabel");
        const thisOverBalls = document.getElementById("thisOverBalls");

        const wicketGraphic = document.getElementById("wicketGraphic");
        const wicketPlayer = document.getElementById("wicketPlayer");
        const wicketScore = document.getElementById("wicketScore");

        const fallWicketGraphic = document.getElementById("fallWicketGraphic");
        const fallWicketPlayer = document.getElementById("fallWicketPlayer");
        const fallWicketScore = document.getElementById("fallWicketScore");

        const partnershipGraphic = document.getElementById("partnershipGraphic");
        const partnershipRuns = document.getElementById("partnershipRuns");
        const partnershipBalls = document.getElementById("partnershipBalls");

        const milestoneGraphic = document.getElementById("milestoneGraphic");
        const milestoneTitle = document.getElementById("milestoneTitle");
        const milestonePlayer = document.getElementById("milestonePlayer");
        const milestoneScore = document.getElementById("milestoneScore");

        const replayGraphic = document.getElementById("replayGraphic");
        const scoreboardBar = document.getElementById("scoreboard");
        const scorecardDim = document.getElementById("scorecardDim");

        const breakGraphic = document.getElementById("breakGraphic");
        const breakTeam = document.getElementById("breakTeam");
        const breakText = document.getElementById("breakText");
        const breakLogo = document.getElementById("breakLogo");

        let lastScore = "";
        let lastBallShown = "";
        let lastDismissalShown = "";
        let battingTeam = "";
        let lastBat1 = "";
        let lastBat2 = "";
        let matchState = {
            bat1: "",
            bat2: "",
            score: "0/0",
            overs: "0.0"
        };
        let overlayState = {
            teamA: "",
            teamB: "",
            teamALogo: "",
            teamBLogo: "",
            battingTeam: ""
        };
        let sceneMode = "normal";
        let isFullScorecardVisible = false;
        const overlayQueue = [];
        let isPlayingOverlay = false;

        const DEBUG = true;

        function safeArray(v) {
            return Array.isArray(v) ? v : [];
        }

        function safeString(v) {
            return v || "";
        }

        function safeNumber(v, fallback = 0) {
            return Number.isFinite(Number(v)) ? Number(v) : fallback;
        }

        function enqueueOverlay(name, duration, renderFn) {
            const priority = {
                wicket: 1,
                "moment-SIX": 2,
                "moment-FOUR": 2,
                partnership: 3,
                lowerThird: 4
            };

            const item = { name, duration, renderFn };

            // insert based on priority
            let index = overlayQueue.findIndex(o => priority[o.name] > priority[name]);

            if (index === -1) {
                overlayQueue.push(item);
            } else {
                overlayQueue.splice(index, 0, item);
            }

            log("ENQUEUE:", name);

            processQueue();
        }

        function processQueue() {
            if (isPlayingOverlay || overlayQueue.length === 0) return;

            const item = overlayQueue.shift();
            isPlayingOverlay = true;

            log("PLAY OVERLAY:", item.name);

            item.renderFn();

            setTimeout(() => {
                log("END OVERLAY:", item.name);
                isPlayingOverlay = false;
                processQueue();
            }, item.duration);
        }

        function setTheme(mode) {
            const root = document.documentElement;
            if (mode === "batting") {
                root.style.setProperty('--espn-primary', '#2563eb');
                root.style.setProperty('--espn-glow', 'rgba(37,99,235,0.8)');
            }

            if (mode === "bowling") {
                root.style.setProperty('--espn-primary', '#7f1d1d');
                root.style.setProperty('--espn-glow', 'rgba(220,38,38,0.8)');
            }
        }

        channel.bind('match', data => {
            if (!data) return;

            // Detect new match / innings
            if (data.reset === true) {
                resetMatchState();
            }

            if (data.batting === data.teamA) {
                setTheme("batting");
            } else {
                setTheme("bowling");
            }

            overlayState.teamA = data.teamA || overlayState.teamA;
            overlayState.teamB = data.teamB || overlayState.teamB;
            overlayState.teamALogo = data.teamALogo || overlayState.teamALogo;
            overlayState.teamBLogo = data.teamBLogo || overlayState.teamBLogo;
            overlayState.battingTeam = data.batting || overlayState.battingTeam;

            const isTeamABatting = data.batting === data.teamA;

            const leftTeamName = isTeamABatting ? data.teamA : data.teamB;
            const rightTeamName = isTeamABatting ? data.teamB : data.teamA;

            const leftTeamLogo = isTeamABatting ? data.teamALogo : data.teamBLogo;
            const rightTeamLogo = isTeamABatting ? data.teamBLogo : data.teamALogo;

            /* LEFT SIDE = ALWAYS BATTING */
            nameA.textContent = (leftTeamName || "").toUpperCase();

            /* RIGHT SIDE = ALWAYS BOWLING */
            nameB.textContent = (rightTeamName || "").toUpperCase();

            /* LEFT LOGO */
            if (leftTeamLogo && leftTeamLogo.trim() !== "") {
                logoA.src = leftTeamLogo;
                logoA.style.display = "block";
            } else {
                logoA.style.display = "none";
            }

            /* RIGHT LOGO */
            if (rightTeamLogo && rightTeamLogo.trim() !== "") {
                logoB.src = rightTeamLogo;
                logoB.style.display = "block";
            } else {
                logoB.style.display = "none";
            }

            battingTeam = data.batting || "";

            const bar = document.getElementById("scoreboard");

            bar.classList.remove("teamAColor", "teamBColor");

            sbTeamA.classList.remove("battingHighlight");
            sbTeamB.classList.remove("battingHighlight");

            /* LEFT SIDE ALWAYS BATTING */
            bar.classList.add("teamAColor");

            sbTeamA.classList.add("battingHighlight");
            sbTeamB.classList.remove("battingHighlight");
        });

        channel.bind('manualScore', data => {
            if (!data) return;

            log("MANUAL RECEIVED: ", data);

            if (data.dismissal && data.dismissal !== lastDismissalShown) {
                lastDismissalShown = data.dismissal;
                enqueueOverlay("wicket", 6500, () => {
                    showWicketSequence(data);
                });
            }

            if (!isFullScorecardVisible) {
                document.getElementById("scoreboard").classList.add("show");
            }
            renderRunWorm(data);

            if (data.score && data.score !== lastScore) {

                sbScore.textContent = data.score;

                sbScore.classList.remove("scoreFlash");
                void sbScore.offsetWidth;
                sbScore.classList.add("scoreFlash");

                lastScore = data.score;
            }

            if (data.overs !== undefined) {
                matchState.overs = data.overs;
                sbOvers.textContent = "(" + data.overs + ")";
            }

            if (data.runRate) sbRR.textContent = "RR " + data.runRate;

            if (data.bat1 !== undefined) {
                const newBat1 = (data.bat1 || "").toUpperCase();

                if (newBat1 !== matchState.bat1) {
                    bat1.classList.remove("strikeMove");
                    void bat1.offsetWidth;
                    bat1.classList.add("strikeMove");
                }

                matchState.bat1 = newBat1;
                bat1.textContent = newBat1;
            }

            if (data.bat1Score) bat1Score.textContent = data.bat1Score;

            if (data.bat2 !== undefined) {
                const newBat2 = (data.bat2 || "").toUpperCase();

                if (newBat2 !== matchState.bat2) {
                    bat2.classList.remove("strikeMove");
                    void bat2.offsetWidth;
                    bat2.classList.add("strikeMove");
                }

                matchState.bat2 = newBat2;
                bat2.textContent = newBat2;
            }

            if (data.bat2Score) bat2Score.textContent = data.bat2Score;

            if (data.bowlerName !== undefined)
                bowlerName.textContent = data.bowlerName.toUpperCase();

            if (data.bowlerStats !== undefined)
                bowlerStats.textContent = data.bowlerStats;

            if (data.thisOver !== undefined) {
                renderBalls(data.thisOver || "");

                const balls = String(data.thisOver || "")
                    .split(" ")
                    .filter(b => b.trim() !== "");
                const lastBall = balls[balls.length - 1] || "";

                const bar = document.getElementById("scoreboard");

                if (lastBall && lastBall !== lastBallShown) {
                    lastBallShown = lastBall;

                    if (lastBall === "4") {
                        bar.classList.add("boundaryGlow");
                        setTimeout(() => bar.classList.remove("boundaryGlow"), 800);
                    }

                    if (lastBall === "6") {
                        bar.classList.add("boundaryGlow");
                        setTimeout(() => bar.classList.remove("boundaryGlow"), 800);
                    }
                }
            }
        });

        channel.bind('scorecard', data => {
            if (!data) return;

            if (!data.batting) data.batting = [];
            if (!data.bowling) data.bowling = [];

            const container = document.getElementById("scorecardContainer");
            container.style.display = "block";
            if (scoreboardBar) scoreboardBar.classList.remove("show");
            //if (scorecardDim) scorecardDim.classList.remove("show");

            // build batting table
            let battingHTML = "<h3>Batting</h3>";
            battingHTML += "<table>";

            safeArray(data.batting).forEach(p => {
                battingHTML += `
                                                                                                          <tr>
                                                                                                            <td>${p.name}</td>
                                                                                                            <td>${p.runs} (${p.balls})</td>
                                                                                                            <td>${p.out ? p.dismissal : "not out"}</td>
                                                                                                          </tr>
                                                                                                        `;
            });

            battingHTML += "</table>";

            // bowling
            let bowlingHTML = "<h3>Bowling</h3><table>";

            safeArray(data.bowling).forEach(b => {
                bowlingHTML += `
                                                                                                          <tr>
                                                                                                            <td>${b.name}</td>
                                                                                                            <td>${b.overs}</td>
                                                                                                            <td>${b.runs}/${b.wickets}</td>
                                                                                                          </tr>
                                                                                                        `;
            });

            bowlingHTML += "</table>";

            container.innerHTML = `
                                                                                                <h2>${data.teamA} vs ${data.teamB}</h2>
                                                                                                ${battingHTML}
                                                                                                ${bowlingHTML}
                                                                                                <div>Total: ${data.total}/${data.wickets} (${data.overs})</div>
                                                                                              `;
        });

        channel.bind('fullScorecard', data => {
            if (!data) return;
            const container = document.getElementById('fullScorecard');
            if (!container) return;


            data.batsmen = data.batsmen || {};
            data.playingXI = data.playingXI || [];
            data.bowlers = data.bowlers || [];

            // ===== HIDE =====
            if (data.hide) {
                isFullScorecardVisible = false;

                container.style.display = "none";
                container.innerHTML = "";

                if (!data.bowlers || data.bowlers.length === 0) {
                    if (scoreboardBar) scoreboardBar.classList.add("show");
                }
                if (scorecardDim) scorecardDim.classList.remove("show");

                return;
            }

            isFullScorecardVisible = true;

            if (scoreboardBar) scoreboardBar.classList.remove("show");
            if (scorecardDim) scorecardDim.classList.add("show");

            // ===== EXTRAS FIX =====
            let extras = 0;
            if (typeof data.extras === "object") {
                extras =
                    (data.extras.wide || 0) +
                    (data.extras.noball || 0) +
                    (data.extras.bye || 0) +
                    (data.extras.legbye || 0);
            } else {
                extras = data.extras || 0;
            }

            // ===== BUILD 11 PLAYERS =====

            // ===== RENDER =====
            let rows = "";
            const players = data.playingXI || [];
            const striker = data.striker || null;
            const safeBatsmen = data.batsmen || {};
            const battedPlayers = players
                .filter(name => safeBatsmen[name])
                .sort((a, b) => {
                    return (safeBatsmen[a].order || 999) - (data.batsmen[b].order || 999);
                });
            const notOut = [];
            const out = [];
            const yetToBat = [];

            battedPlayers.forEach(name => {
                const s = data.batsmen[name];

                const isNotOut = !s.out;
                const isStriker = striker === name;

                rows += `
                                                                                        <tr class="${isNotOut ? 'not-out-row' : ''} ${isStriker ? 'striker-row' : ''}">
                                                                                            <td class="player">
                                                                                    ${name}
                                                                                    ${isStriker ? '<span class="strike-star">★</span>' : ''}
                                                                                            </td>
                                                                                            <td class="dismissal">
                                                                                                ${isNotOut ? "not out" : (s.dismissal || "")}
                                                                                            </td>
                                                                                            <td class="runs">${s.runs}</td>

            setTimeout(() => {

                // hide main wicket
                wicketGraphic.classList.remove("show");

                // ===== FALL OF WICKET =====
                showFallOfWicket(data);

                if (fallWicketGraphic) {
                    fallWicketGraphic.classList.add("show");
                }

                // hide fall of wicket
                setTimeout(() => {
                    fallWicketGraphic.classList.remove("show");
                }, 2500);

            }, 3000); // after main wicket finishes
        }

        function sendOverlayState(state) {
            fetch('/api/broadcast', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event: 'overlayState',
                    data: { state: state }
                })
            });
        }

        function renderBalls(over) {

            thisOverBalls.innerHTML = "";

            const balls = String(over || "")
                .split(" ")
                .filter(b => b.trim() !== "");

            balls.forEach((b, i) => {
                const el = document.createElement("span");
                el.className = "ball";

                let label = b;

                if (b === "4") el.classList.add("four");
                else if (b === "6") el.classList.add("six");
                else if (b === "W") el.classList.add("wicket");

                else if (b === "Wd" || b === "WD") {
                    el.classList.add("extra");
                    label = "WD";
                }

                else if (b === "Nb" || b === "NB") {
                    el.classList.add("extra");
                    label = "NB";
                }

                el.textContent = label;

                if (i === balls.length - 1) {
                    el.classList.add("lastBall");
                }

                thisOverBalls.appendChild(el);
            });
        }

        function showPartnership(data) {
            if (!data) return;

            log("RENDER PARTNERSHIP:", data);

            // ✅ Runs + Balls (you already use these correctly)
            if (partnershipRuns) {
                partnershipRuns.textContent = (data.runs || 0) + " RUNS";
            }

            if (partnershipBalls) {
                partnershipBalls.textContent = (data.balls || 0) + " BALLS";
            }

            // ✅ PLAYERS (THIS IS WHAT YOU ARE MISSING)
            const container = document.getElementById("partnershipPlayers");

            if (container) {
                container.innerHTML = `
                                                            <div style="display:flex;align-items:center;gap:16px">

                                                                <div style="text-align:center">
                                                                    <img src="${data.bat1Img || ''}"
                                                                         style="width:50px;height:50px;border-radius:50%;object-fit:cover">
                                                                    <div>${data.bat1 || ''}</div>
                                                                </div>

                                                                <div style="font-weight:700">+</div>

                                                                <div style="text-align:center">
                                                                    <img src="${data.bat2Img || ''}"
                                                                         style="width:50px;height:50px;border-radius:50%;object-fit:cover">
                                                                    <div>${data.bat2 || ''}</div>
                                                                </div>

                                                            </div>
                                                        `;
            }

            // SHOW GRAPHIC
            partnershipGraphic.classList.add("show");

            setTimeout(() => {
                partnershipGraphic.classList.remove("show");
            }, 4500);
        }

        function applySceneMode() {
            let opacity = 0.75;

            // normalize input (fixes case issues)
            const mode = (sceneMode || "").toLowerCase();

            if (mode === "bright") opacity = 0.85;
            else if (mode === "dark") opacity = 0.6;
            else if (mode === "normal") opacity = 0.75;

            const targets = [
                "bowlerLowerThird",
                "batsmanLowerThird",
                "playerGraphic"
            ];

            targets.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;

                el.style.background = `
                                                            linear-gradient(90deg,
                                                                rgba(2,6,23,${opacity}),
                                                                rgba(15,23,42,${opacity})
                                                            )
                                                        `;
            });
        }

        function showMoment(type) {
            let glow = "#facc15";
            let text = type;

            if (type === "SIX") glow = "#22c55e";
            if (type === "WICKET") glow = "#ef4444";

            momentGlow.style.background = glow;

            momentFallback.textContent = text;
            momentFallback.style.display = "block";

            momentStinger.style.opacity = "1";

            momentFallback.style.animation = "momentIn .45s forwards";

            setTimeout(() => {
                momentFallback.style.animation = "momentOut .35s forwards";

                setTimeout(() => {
                    momentStinger.style.opacity = "0";
                }, 350);

            }, 2200);
        }

        function showTicker(text) {
            const ticker = document.getElementById("tvTicker");
            const label = document.getElementById("tickerText");

            label.textContent = text;
            ticker.classList.add("show");

            setTimeout(() => {
                ticker.classList.remove("show");
            }, 4000);
        }

        function showWicket(data) {
            if (!data.dismissal) return;

            const player = data.dismissal
                .replace(/\d+\s*\(\d+\).*/, "")
                .trim();

            const scoreMatch = data.dismissal.match(/\d+\s\(\d+\)/);

            let score = "";

            if (scoreMatch) {
                score = scoreMatch[0];
            }

            const dismissalText =
                data.dismissal.replace(player + " " + score, "").trim();

            wicketPlayer.textContent = player.toUpperCase();
            wicketScore.textContent =
                score + " • " + dismissalText.toUpperCase();

            /* FALL OF WICKET (prepare data BEFORE queue runs) */
            fallWicketPlayer.textContent =
                player.toUpperCase() + " " + score;

            fallWicketScore.textContent =
                sbScore.textContent + " • " + sbOvers.textContent;

            wicketGraphic.classList.add("show");
        }

        function showFallOfWicket(data) {

            fallWicketPlayer.textContent = (data.player || "").toUpperCase();
            fallWicketScore.textContent = data.score || "";

            /*fallWicketGraphic.classList.add("show");

            setTimeout(() => {
                fallWicketGraphic.classList.remove("show");
            }, 4000);*/
        }

        function hideTeamXI() {
            const overlay = document.getElementById("teamXIOverlay");
            const content = document.getElementById("teamXIContent");

            overlay.style.display = "none";
            content.innerHTML = "";
        }

        function renderRunWorm(data) {
            if (!data.runsPerOver) return;

            const worm = document.getElementById("runworm");
            worm.innerHTML = "";

            const overs = data.runsPerOver.slice(-10);

            overs.forEach(r => {

                const bar = document.createElement("div");
                bar.className = "wormBar";

                bar.style.height = (10 + r * 5) + "px";

                worm.appendChild(bar);
            });
        }

        function resetMatchState() {

            matchState = {
                bat1: "",
                bat2: "",
                score: "0/0",
                overs: "0.0"
            };

            sbScore.textContent = "0/0";
            sbOvers.textContent = "(0.0)";
            sbRR.textContent = "RR 0.00";

            bat1.textContent = "";
            bat1Score.textContent = "";

            bat2.textContent = "";
            bat2Score.textContent = "";

            bowlerName.textContent = "";
            bowlerStats.textContent = "";

            thisOverBalls.innerHTML = "";

            lastScore = "";
            lastBallShown = "";
            lastDismissalShown = "";

            partnershipRunCount = 0;
            partnershipBallCount = 0;

            // FORCE CLEAR BALL UI
            renderBalls("");

            log("✅ FULL RESET DONE");
        }

        function log(...args) {
            if (DEBUG) console.log(...args);
        }

        applySceneMode();
    </script>
</body>
</html>
