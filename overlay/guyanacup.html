<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NYC Eagles Broadcast Overlay</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://js.pusher.com/8.2/pusher.min.js"></script>

    <style>
        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Juralight-LmrZ.ttf') format('truetype');
            font-weight: 300;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Jurabook-dvpK.ttf') format('truetype');
            font-weight: 400;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Juramedium-Xdgd.ttf') format('truetype');
            font-weight: 500;
        }

        @font-face {
            font-family: 'Jura';
            src: url('assets/fonts/Jurademibold-Povr.ttf') format('truetype');
            font-weight: 700;
        }

        @font-face {
            font-family: 'Eurostile';
            src: url('assets/fonts/Eurostile-Medium Medium.ttf') format('truetype');
            font-weight: 500;
        }

        :root {
            --espn-primary: #2563eb;
            --espn-glow: rgba(37,99,235,0.8);
            --batting-primary: #9A0A3A;
            --batting-accent: #EC2C89;
            --batting-text: #FFFFFF;
            --bowling-primary: #0A1A3F;
            --bowling-accent: #D4A017;
            --bowling-text: #FFFFFF;
            --z-scoreboard: 100;
            --z-overlay: 500;
            --z-fullscreen: 120000;
        }

        html, body {
            margin: 0;
            width: 1920px;
            height: 1080px;
            background: transparent;
            overflow: hidden;
            font-family: 'Roboto Condensed', 'Oswald', 'Arial Narrow', Arial, sans-serif;
        }

        /* CONNECTION DOT */
        #connectionDot {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #facc15;
            z-index: 9999;
        }

        /* LOWER THIRD */
        #lowerThird {
            position: absolute;
            left: 60px;
            bottom: 200px; /* 🔥 final ESPN height */

            opacity: 0;
            transform: translateX(-120%);
            transition: all .5s cubic-bezier(.22,.9,.3,1);
        }

            #lowerThird,
            #lowerThird * {
                font-family: 'Oswald', 'Eurostile', sans-serif !important;
            }

        /* ===== LOWER THIRD - ESPN SYSTEM ===== */

        .lt-card {
            position: relative;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 18px;
            width: fit-content;
            max-width: 540px;
            background:
                linear-gradient(90deg,
                    color-mix(in srgb, var(--batting-primary) 82%, #000 18%) 0%,
                    color-mix(in srgb, var(--batting-primary) 58%, #071426 42%) 62%,
                    #071426 100%);
            border-radius: 6px;
            border-left: 5px solid var(--batting-accent);
            box-shadow: 0 6px 20px rgba(0,0,0,.6), 0 0 20px color-mix(in srgb, var(--batting-accent) 22%, transparent), inset 0 0 12px rgba(255,255,255,0.05);
            overflow: hidden;
        }

            .lt-card::before {
                content: "";
                position: absolute;
                left: -100%;
                top: 0;
                height: 100%;
                width: 100%;
                background: linear-gradient( 90deg, transparent, rgba(255,255,255,0.08), transparent );
            }

            /* TRIGGER WIPE */
            .lt-card.animate::before {
                animation: ltWipe .7s ease forwards;
            }

        @keyframes ltWipe {
            from {
                left: -100%;
            }

            to {
                left: 100%;
            }
        }

        .lt-card.show img {
            animation: playerPop .4s ease forwards;
        }

        @keyframes playerPop {
            from {
                transform: scale(.7);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Accent bar */
        .lt-accent {
            width: 6px;
            height: 100%;
            background: linear-gradient(var(--batting-accent), color-mix(in srgb, var(--batting-primary) 64%, #000 36%));
        }

        /* Content block */
        .lt-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .lt-team {
            font-size: 10px;
            font-weight: 500;
            color: color-mix(in srgb, var(--batting-accent) 70%, #fff 30%);
            letter-spacing: 1.2px;
            line-height: 14px;
        }

        .lt-name {
            font-size: 24px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            line-height: 28px;
            text-transform: uppercase;
        }

        .lt-team,
        .lt-name,
        #bowlerTeam,
        #bowlerCardName {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #bowlerCardName,
        #bowlerTeam,
        #ltName,
        #ltTeam,
        #fallWicketPlayer,
        #milestonePlayer,
        #wicketPlayer {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .lt-role {
            font-size: 12px;
            font-weight: 500;
            color: color-mix(in srgb, var(--batting-accent) 42%, #fff 58%);
            line-height: 16px;
        }

        .lt-extra {
            font-size: 11px;
            color: #94a3b8;
            line-height: 14px;
        }

        #photoMask {
            position: absolute;
            width: 87px;
            height: 87px;
            left: 40px;
            top: 138px;
            border-radius: 50%;
            overflow: hidden;
        }

        #playerImage {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            display: none;
            border: 2px solid rgba(255,255,255,0.25);
            box-shadow: 0 0 0 2px var(--batting-accent), 0 0 10px color-mix(in srgb, var(--batting-accent) 72%, transparent);
            transform: scale(.85);
            opacity: 0;
        }

        @keyframes playerIn {
            0% {
                opacity: 0;
                transform: scale(.7);
            }

            60% {
                opacity: 1;
                transform: scale(1.08);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes playerPulse {
            0% {
                box-shadow: 0 0 0 2px var(--batting-accent), 0 0 12px color-mix(in srgb, var(--batting-accent) 70%, transparent), 0 0 25px color-mix(in srgb, var(--batting-accent) 48%, transparent);
            }

            50% {
                box-shadow: 0 0 0 3px var(--batting-accent), 0 0 18px color-mix(in srgb, var(--batting-accent) 78%, transparent), 0 0 35px color-mix(in srgb, var(--batting-accent) 54%, transparent);
            }

            100% {
                box-shadow: 0 0 0 2px var(--batting-accent), 0 0 12px color-mix(in srgb, var(--batting-accent) 70%, transparent), 0 0 25px color-mix(in srgb, var(--batting-accent) 48%, transparent);
            }
        }


        #separator {
            position: absolute;
            left: 140px;
            top: 195px;
            width: 300px;
            height: 2px;
            background: rgba(255,255,255,.6);
        }

        /* ================ Bowler Lower Third ============== */
        #bowlerLowerThird::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 8px;
            box-shadow: 0 0 25px color-mix(in srgb, var(--bowling-accent) 30%, transparent);
            opacity: 0;
            transition: opacity .4s ease;
        }

       #bowlerLowerThird {
            position: absolute;
            bottom: 240px;
            right: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 18px 26px 22px;
            min-height: 166px;
            width: 360px;
            max-width: 360px;
            background:
                radial-gradient(circle at 50% 0%, color-mix(in srgb, var(--bowling-accent) 18%, transparent) 0%, transparent 36%),
                linear-gradient(100deg,
                    color-mix(in srgb, var(--bowling-primary) 76%, #020817 24%) 0%,
                    #111827 72%,
                    #394150 100%);
            border-radius: 6px;
            border-left: 6px solid var(--bowling-accent);
            box-shadow: 0 18px 38px rgba(0,0,0,.55), inset 0 0 18px rgba(255,255,255,0.04);
            opacity: 0;
            transform: translateX(120%);
            transition: all .5s cubic-bezier(.22,.9,.3,1);
            z-index: var(--z-overlay);
        }

        @keyframes bowlerIn {
            0% {
                transform: translateX(120%) scale(.9);
                opacity: 0;
            }

            60% {
                transform: translateX(-10px) scale(1.03);
                opacity: 1;
            }

            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }

        .bowler-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            align-items: center;
            text-align: center;
            min-width: 0;
            width: 100%;
        }
        
        #bowlerTeam {
            font-size: 11px;
            font-weight: 900;
            color: color-mix(in srgb, var(--bowling-accent) 72%, #fff 28%);
            letter-spacing: 1.2px;
            line-height: 12px;
            margin: 0;
            text-transform: uppercase;
        }

        #bowlerLabel {
            font-size: 11px;
            font-weight: 800;
            color: var(--bowling-accent);
            letter-spacing: 2px;
            line-height: 12px;
            text-transform: uppercase;
        }

        #bowlerCardName {
            font-size: 28px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            line-height: 30px;
            margin: 0;
            max-width: 100%;
            white-space: normal;
            overflow: visible;
            text-overflow: clip;
        }

        #bowlerCardStats {
            font-size: 12px;
            color: #cbd5f5;
            line-height: 14px;
            margin: 0;
            font-weight: 800;
        }

        #bowlerLowerThird.show img {
            animation: playerPop .4s ease forwards;
        }

        #bowlerImage {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            display: none;
            margin: 0 auto;
            border: 2px solid var(--bowling-accent);
            box-shadow: 0 0 0 2px var(--bowling-accent), 0 0 10px color-mix(in srgb, var(--bowling-accent) 70%, transparent);
            transform: scale(.85);
            opacity: 0;
        }

        /* ================= MOMENT STINGER ================= */

        #momentStinger {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent; /* fully transparent */
            opacity: 0;
            pointer-events: none;
            transition: opacity .15s ease;
            z-index: var(--z-overlay);
        }

        #momentGlow {
            position: absolute;
            width: 900px;
            height: 900px;
            border-radius: 50%;
            filter: blur(160px);
            opacity: .75; /* stronger for daylight */
            transform: scale(.6);
            transition: transform .4s ease;
        }

        #momentImage {
            max-width: 1200px;
            width: 75%;
            transform: scale(.4);
            opacity: 0;
            z-index: 2;
        }

        #momentFallback {
            position: absolute;
            font-size: 200px;
            font-weight: 700;
            letter-spacing: .1em;
            display: none;
            z-index: 2;
            font-family: 'Oswald', sans-serif;
        }

        /* Animations */
        /* ENTRY ANIMATION */
        @keyframes momentIn {
            0% {
                transform: scale(.4);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* EXIT ANIMATION */
        @keyframes momentOut {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(.6);
                opacity: 0;
            }
        }


        /* WICKET SHAKE */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-12px);
            }

            40% {
                transform: translateX(12px);
            }

            60% {
                transform: translateX(-8px);
            }

            80% {
                transform: translateX(8px);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* ================= LEAGUE BUG (ALWAYS ON) ================= */

        #leagueBug {
            position: absolute;
            top: 60px;
            right: 80px;
            padding: 0;
            background: transparent;
            backdrop-filter: none;
            border-radius: 4px;
            z-index: 9000;
            opacity: 0;
            transform: translateX(40px);
            transition: all .6s cubic-bezier(.22,.9,.3,1);
        }

        #leagueLogo {
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.4));
        }

        #leagueBug.show {
            opacity: 0.92;
            transform: translateX(0);
        }

        #leagueText {
            font-size: 22px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            line-height: 1.1;
        }

        #tournamentText {
            font-size: 14px;
            color: #e5e7eb;
            text-transform: uppercase;
        }

        #scoreFrame {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 1080px;
            border: none;
            display: none;
            z-index: 1;
        }

        /* ================= TOP SPONSOR BAR ================= */

        #topSponsorBar {
            position: absolute;
            top: 0;
            left: 0;
            width: 1920px;
            height: 140px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(-100%);
            transition: transform .6s cubic-bezier(.22,.9,.3,1), opacity .4s ease;
            z-index: 10000;
        }

            #topSponsorBar.show {
                opacity: 1;
                transform: translateY(0);
            }

        #topSponsorImage {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ================= SKY STYLE SCOREBOARD ================= */

        #scoreboard {
            position: absolute;
            bottom: 42px;
            left: 50%;
            transform: translate(-50%,140%);
            width: 1836px;
            height: 100px;
            background: linear-gradient(90deg, #061224 0%, #071426 48%, #071426 100%);
            border-radius: 9px;
            display: grid;
            grid-template-columns: 330px 188px 584px 184px 220px 330px;
            align-items: center;
            padding: 0;
            color: #fff;
            z-index: var(--z-scoreboard);
            transition: transform .6s ease, opacity .3s ease;
            box-shadow: 0 12px 28px rgba(0,0,0,.50), inset 0 1px 0 rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            --batting-primary: #9A0A3A;
            --batting-accent: #EC2C89;
            --batting-text: #FFFFFF;
            --bowling-primary: #0A1A3F;
            --bowling-accent: #D4A017;
            --bowling-text: #FFFFFF;
        }

            #scoreboard.show {
                transform: translate(-50%,0);
            }

        #scoreboard,
        #scoreboard * {
            box-sizing: border-box;
        }

        #sbTeamA, #sbTeamB {
            position: relative;
            display: grid;
            grid-template-columns: 76px 1fr;
            align-items: center;
            gap: 12px;
            width: 100%;
            height: 100%;
            min-width: 0;
            color: var(--batting-text);
            background:
                linear-gradient(108deg,
                    #071426 0%,
                    var(--batting-primary) 18%,
                    var(--batting-primary) 61%,
                    var(--batting-accent) 100%);
            padding: 0 42px 0 12px;
            overflow: hidden;
            clip-path: polygon(0 0, 96% 0, 86% 100%, 0 100%);
        }

        #sbTeamB {
            grid-template-columns: 1fr 76px;
            gap: 12px;
            color: var(--bowling-text);
            background:
                linear-gradient(108deg,
                    var(--bowling-primary) 0%,
                    var(--bowling-primary) 70%,
                    #071426 100%);
            padding: 0 8px 0 50px;
            clip-path: polygon(12% 0, 100% 0, 100% 100%, 0 100%);
        }

        #scoreboard .battingHighlight {
            animation: none;
            border: 0;
            border-radius: 0;
            box-shadow: none;
        }

        #scoreboard .battingHighlight::before {
            content: none;
        }

        #sbTeamA::after,
        #sbTeamB::before {
            content: "";
            position: absolute;
            top: -8px;
            bottom: -8px;
            width: 5px;
            background: linear-gradient(180deg, rgba(255,255,255,.75), var(--batting-accent) 52%, var(--batting-primary));
            transform: skewX(-18deg);
            box-shadow: 0 0 10px var(--batting-accent);
        }

        #sbTeamA::after {
            right: 16px;
            z-index: 2;
        }

        #sbTeamB::before {
            left: 0;
            z-index: 2;
            top: 0;
            bottom: 0;
            width: 48px;
            transform: none;
            clip-path: polygon(78% 0, 88% 0, 12% 100%, 2% 100%);
            background: linear-gradient(180deg, rgba(255,255,255,.75), var(--bowling-accent) 48%, var(--bowling-primary));
            box-shadow: 0 0 8px var(--bowling-accent);
        }

        #scoreboard .scoreLogoWrap {
            width: 74px;
            height: 74px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: transparent;
            border-radius: 50%;
            border: 0;
            box-shadow: 0 0 12px rgba(0,0,0,.45);
            flex: 0 0 auto;
        }

        #logoA,
        #logoB {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            clip-path: circle(50% at 50% 50%);
            border-radius: 50%;
        }

        #nameA, #nameB {
            font-family: 'Roboto Condensed', 'Oswald', 'Arial Narrow', Arial, sans-serif;
            font-size: 28px;
            line-height: 29px;
            font-weight: 900;
            letter-spacing: -.2px;
            color: currentColor;
            display: flex;
            align-items: center;
            min-width: 0;
            text-transform: uppercase;
            overflow-wrap: anywhere;
            max-height: 58px;
            text-shadow: 0 2px 8px rgba(0,0,0,.55);
        }

        #nameB {
            justify-content: flex-end;
            text-align: left;
            max-width: 220px;
            white-space: normal;
            overflow-wrap: anywhere;
            overflow: visible;
            text-overflow: clip;
        }

        #sbScoreBlock {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            border-right: 2px solid var(--batting-accent);
            gap: 3px;
            padding-bottom: 2px;
            min-width: 0;
            overflow: visible;
        }

        #sbBattingPanel {
            height: 100%;
            min-width: 0;
            display: grid;
            grid-template-rows: 50px 50px;
        }

        #sbScore {
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            font-size: 50px;
            line-height: 50px;
            font-weight: 600;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: 0 3px 12px rgba(0,0,0,.45);
        }

        #sbScoreBlock > div:first-child {
            display: flex;
            align-items: baseline;
            justify-content: center;
            white-space: nowrap;
        }

        #sbOvers {
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            font-size: 21px;
            line-height: 21px;
            color: rgba(255,255,255,.94);
            font-weight: 700;
            margin-left: 7px;
        }

        #sbRR {
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            font-size: 24px;
            line-height: 24px;
            color: rgba(255,255,255,.94);
            font-weight: 700;
        }

        #scoreboardMeta {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            height: 43px;
            color: rgba(255,255,255,.95);
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            font-size: 22px;
            font-weight: 600;
            border-bottom: 2px solid var(--batting-accent);
        }

        .scoreMetric {
            white-space: nowrap;
            min-width: max-content;
        }

        #scoreboardMeta.has-target #scoreMetricA,
        #scoreboardMeta.has-target #scoreMetricB,
        #scoreboardMeta:not(.has-target) #scoreMetricB {
            padding-left: 24px;
            border-left: 2px solid var(--batting-accent);
        }

        .scoreMetric.is-hidden {
            display: none;
        }

        #sbBatters {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            height: 50px;
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            color: #fff;
        }

        .batRow {
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 0;
            width: calc(50% - 6px);
            padding: 0 9px;
            border-right: 2px solid var(--batting-accent);
            line-height: 28px;
        }

            .batRow:last-child {
                border-right: 0;
            }

            .batRow::before {
                content: "";
                width: 0;
                height: 0;
                border-top: 10px solid transparent;
                border-bottom: 10px solid transparent;
                border-left: 13px solid var(--batting-accent);
                filter: none;
            }

            .batRow span:first-child {
                font-size: 22px;
                font-weight: 600;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                max-width: 150px;
                min-width: 0;
            }

        #bat1Score,
        #bat2Score {
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .batSr {
            color: var(--batting-accent);
            font-size: 17px;
            font-weight: 600;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        #sbBowler {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            height: 100%;
            padding: 0 12px;
            border-left: 2px solid var(--batting-accent);
            border-right: 2px solid var(--bowling-accent);
            font-family: 'Roboto Condensed', 'Oswald', sans-serif;
            min-width: 0;
        }

        #bowlerName {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 26px;
            align-items: center;
            gap: 9px;
            font-weight: 600;
            font-size: 19px;
            line-height: 22px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

            #bowlerNameText {
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;

    <script>

        const PUSHER_KEY = "12fcceaea77e52cf3626";
        const pusher = new Pusher(PUSHER_KEY, { cluster: 'us2', forceTLS: true });
        const channel = pusher.subscribe('broadcast');

        const logoA = document.getElementById("logoA");
        const logoB = document.getElementById("logoB");
        const nameA = document.getElementById("nameA");
        const nameB = document.getElementById("nameB");
        const sbTeamA = document.getElementById("sbTeamA");
        const sbTeamB = document.getElementById("sbTeamB");

        const sbScore = document.getElementById("sbScore");
        const sbOvers = document.getElementById("sbOvers");
        const sbRR = document.getElementById("sbRR");
        const scoreMetricA = document.getElementById("scoreMetricA");
        const scoreMetricB = document.getElementById("scoreMetricB");
        const scoreMetricTarget = document.getElementById("scoreMetricTarget");
        const scoreboardMeta = document.getElementById("scoreboardMeta");
        const sbBowler = document.getElementById("sbBowler");
        const bowlerNameText = document.getElementById("bowlerNameText");
        const bat1 = document.getElementById("bat1");
        const bat1Score = document.getElementById("bat1Score");
        const bat1Sr = document.getElementById("bat1Sr");
        const bat2 = document.getElementById("bat2");
        const bat2Score = document.getElementById("bat2Score");
        const bat2Sr = document.getElementById("bat2Sr");

        const bowlerName = document.getElementById("bowlerName");
        const bowlerStats = document.getElementById("bowlerStats");
        const bowlerLabel = document.getElementById("bowlerLabel");
        const thisOverBalls = document.getElementById("thisOverBalls");

        function formatScoreboardPersonName(name) {
            const clean = stripRoleTags(String(name || "").replace(/\*/g, "")).trim();
            if (!clean) return "";
            const parts = clean.split(/\s+/).filter(Boolean);
            if (parts.length > 1) {
                const first = parts[0].charAt(0).toUpperCase();
                const last = parts[parts.length - 1];
                return `${first}. ${last}`;
            }
            return clean;
        }

        function setScoreboardBowlerName(name) {
            const displayName = formatScoreboardPersonName(name);
            bowlerNameText.textContent = displayName;
            sbBowler.classList.toggle("hasBowler", Boolean(String(displayName).trim()));
        }

        const wicketGraphic = document.getElementById("wicketGraphic");
        const wicketPlayer = document.getElementById("wicketPlayer");
        const wicketScore = document.getElementById("wicketScore");

        const fallWicketGraphic = document.getElementById("fallWicketGraphic");
        const fallWicketPlayer = document.getElementById("fallWicketPlayer");
        const fallWicketScore = document.getElementById("fallWicketScore");

        const partnershipGraphic = document.getElementById("partnershipGraphic");
        const partnershipRuns = document.getElementById("partnershipRuns");
        const partnershipBalls = document.getElementById("partnershipBalls");

        const milestoneGraphic = document.getElementById("milestoneGraphic");
        const milestoneTitle = document.getElementById("milestoneTitle");
        const milestonePlayer = document.getElementById("milestonePlayer");
        const milestoneScore = document.getElementById("milestoneScore");

        const replayGraphic = document.getElementById("replayGraphic");
        const scoreboardBar = document.getElementById("scoreboard");
        const scorecardDim = document.getElementById("scorecardDim");

        const breakGraphic = document.getElementById("breakGraphic");
        const breakTeam = document.getElementById("breakTeam");
        const breakText = document.getElementById("breakText");
        const breakLogo = document.getElementById("breakLogo");

        let lastScore = "";
        let lastBallShown = "";
        let lastDismissalShown = "";
        let battingTeam = "";
        let lastBat1 = "";
        let lastBat2 = "";
        let matchState = {
            bat1: "",
            bat2: "",
            score: "0/0",
            overs: "0.0"
        };
        let overlayState = {
            teamA: "",
            teamB: "",
            teamALogo: "",
            teamBLogo: "",
            battingTeam: "",
            target: "",
            teamAColors: {
                primary: "#9A0A3A",
                accent: "#EC2C89",
                text: "#FFFFFF"
            },
            teamBColors: {
                primary: "#0A1A3F",
                accent: "#D4A017",
                text: "#FFFFFF"
            }
        };
        let sceneMode = "normal";
        let isFullScorecardVisible = false;
        const overlayQueue = [];
        let isPlayingOverlay = false;

        const DEBUG = true;

        function safeArray(v) {
            return Array.isArray(v) ? v : [];
        }

        function safeString(v) {
            return v || "";
        }

        function safeNumber(v, fallback = 0) {
            return Number.isFinite(Number(v)) ? Number(v) : fallback;
        }

        function normalizeHexColor(value, fallback) {
            const raw = String(value || "").trim();
            if (/^#[0-9a-f]{6}$/i.test(raw)) return raw;
            if (/^[0-9a-f]{6}$/i.test(raw)) return "#" + raw;
            return fallback;
        }

        function getScoreboardColors(data, teamKey, fallbackPrimary, fallbackAccent, fallbackText) {
            return {
                primary: normalizeHexColor(data?.[`${teamKey}PrimaryColor`] || data?.[`${teamKey}Color`], fallbackPrimary),
                accent: normalizeHexColor(data?.[`${teamKey}AccentColor`], fallbackAccent),
                text: normalizeHexColor(data?.[`${teamKey}TextColor`], fallbackText)
            };
        }

        function stripRoleTags(name) {
            return String(name || "")
                .replace(/\s*\([^)]*\)/g, "")
                .replace(/\s+/g, " ")
                .trim();
        }

        function displayBatterName(name) {
            const raw = String(name || "");
            const star = raw.includes("*") ? "*" : "";
            return stripRoleTags(raw.replace(/\*/g, "")) + star;
        }

        function applyScoreboardColors(isTeamABatting) {
            const battingColors = isTeamABatting ? overlayState.teamAColors : overlayState.teamBColors;
            const bowlingColors = isTeamABatting ? overlayState.teamBColors : overlayState.teamAColors;
            document.documentElement.style.setProperty("--batting-primary", battingColors.primary);
            document.documentElement.style.setProperty("--batting-accent", battingColors.accent);
            document.documentElement.style.setProperty("--batting-text", battingColors.text);
            document.documentElement.style.setProperty("--bowling-primary", bowlingColors.primary);
            document.documentElement.style.setProperty("--bowling-accent", bowlingColors.accent);
            document.documentElement.style.setProperty("--bowling-text", bowlingColors.text);
            scoreboardBar.style.setProperty("--batting-primary", battingColors.primary);
            scoreboardBar.style.setProperty("--batting-accent", battingColors.accent);
            scoreboardBar.style.setProperty("--batting-text", battingColors.text);
            scoreboardBar.style.setProperty("--bowling-primary", bowlingColors.primary);
            scoreboardBar.style.setProperty("--bowling-accent", bowlingColors.accent);
            scoreboardBar.style.setProperty("--bowling-text", bowlingColors.text);
            document.documentElement.style.setProperty("--espn-primary", battingColors.accent);
            document.documentElement.style.setProperty("--espn-glow", `${battingColors.accent}cc`);
        }

        function parseRunsBalls(scoreText) {
            const match = String(scoreText || "").match(/(\d+)\s*\((\d+)\)/);
            if (!match) return null;
            return {
                runs: Number(match[1]),
                balls: Number(match[2])
            };
        }

        function formatStrikeRate(scoreText) {
            const parsed = parseRunsBalls(scoreText);
            if (!parsed || parsed.balls <= 0) return "SR 0.0";
            return `SR ${((parsed.runs / parsed.balls) * 100).toFixed(1)}`;
        }

        function isBowlingMilestoneLabel(label) {
            const raw = String(label || "").toUpperCase();
            return raw.includes("WICKET") || raw.includes("HATTRICK") || raw.includes("MAIDEN") || raw.includes("BOWLER");
        }

        function enqueueOverlay(name, duration, renderFn) {
            const priority = {
                wicket: 1,
                "moment-SIX": 2,
                "moment-FOUR": 2,
                partnership: 3,
                lowerThird: 4
            };

            const item = { name, duration, renderFn };

            // insert based on priority
            let index = overlayQueue.findIndex(o => priority[o.name] > priority[name]);

            if (index === -1) {
                overlayQueue.push(item);
            } else {
                overlayQueue.splice(index, 0, item);
            }

            log("ENQUEUE:", name);

            processQueue();
        }

        function processQueue() {
            if (isPlayingOverlay || overlayQueue.length === 0) return;

            const item = overlayQueue.shift();
            isPlayingOverlay = true;

            log("PLAY OVERLAY:", item.name);

            item.renderFn();

            setTimeout(() => {
                log("END OVERLAY:", item.name);
                applyBrandingState();
                isPlayingOverlay = false;
                processQueue();
            }, item.duration);
        }

        function setTheme(mode) {
            const root = document.documentElement;
            if (mode === "batting") {
                root.style.setProperty('--espn-primary', '#2563eb');
                root.style.setProperty('--espn-glow', 'rgba(37,99,235,0.8)');
            }

            if (mode === "bowling") {
                root.style.setProperty('--espn-primary', '#7f1d1d');
                root.style.setProperty('--espn-glow', 'rgba(220,38,38,0.8)');
            }
        }

        channel.bind('match', data => {
            if (!data) return;

            // Detect new match / innings
            if (data.reset === true) {
                resetMatchState();
            }

            if (data.batting === data.teamA) {
                setTheme("batting");
            } else {
                setTheme("bowling");
            }

            overlayState.teamA = data.teamA || overlayState.teamA;
            overlayState.teamB = data.teamB || overlayState.teamB;
            overlayState.teamALogo = data.teamALogo || overlayState.teamALogo;
            overlayState.teamBLogo = data.teamBLogo || overlayState.teamBLogo;
            overlayState.battingTeam = data.batting || overlayState.battingTeam;
            overlayState.target = data.target || data.targetScore || data.chaseTarget || overlayState.target;
            overlayState.teamAColors = getScoreboardColors(data, "teamA", overlayState.teamAColors.primary, overlayState.teamAColors.accent, overlayState.teamAColors.text);
            overlayState.teamBColors = getScoreboardColors(data, "teamB", overlayState.teamBColors.primary, overlayState.teamBColors.accent, overlayState.teamBColors.text);

            const isTeamABatting = data.batting === data.teamA;
            applyScoreboardColors(isTeamABatting);

            const leftTeamName = isTeamABatting ? data.teamA : data.teamB;
            const rightTeamName = isTeamABatting ? data.teamB : data.teamA;

            const leftTeamLogo = isTeamABatting ? data.teamALogo : data.teamBLogo;
            const rightTeamLogo = isTeamABatting ? data.teamBLogo : data.teamALogo;

            /* LEFT SIDE = ALWAYS BATTING */
            nameA.textContent = (leftTeamName || "").toUpperCase();

            /* RIGHT SIDE = ALWAYS BOWLING */
            nameB.textContent = (rightTeamName || "").toUpperCase();

            /* LEFT LOGO */
            if (leftTeamLogo && leftTeamLogo.trim() !== "") {
                logoA.src = leftTeamLogo;
                logoA.style.display = "block";
            } else {
                logoA.style.display = "none";
            }

            /* RIGHT LOGO */
            if (rightTeamLogo && rightTeamLogo.trim() !== "") {
                logoB.src = rightTeamLogo;
                logoB.style.display = "block";
            } else {
                logoB.style.display = "none";
            }

            battingTeam = data.batting || "";

            sbTeamA.classList.remove("battingHighlight");
            sbTeamB.classList.remove("battingHighlight");
        });

        channel.bind('manualScore', data => {
            if (!data) return;

            log("MANUAL RECEIVED: ", data);

            if (data.dismissal && data.dismissal !== lastDismissalShown) {
                lastDismissalShown = data.dismissal;
                enqueueOverlay("wicket", 6500, () => {
                    showWicketSequence(data);
                });
            }

            if (!isFullScorecardVisible) {
                document.getElementById("scoreboard").classList.add("show");
            }
            renderRunWorm(data);

            if (data.score && data.score !== lastScore) {

                sbScore.textContent = data.score;

                sbScore.classList.remove("scoreFlash");
                void sbScore.offsetWidth;
                sbScore.classList.add("scoreFlash");

                lastScore = data.score;
            }

            if (data.overs !== undefined) {
                matchState.overs = data.overs;
                sbOvers.textContent = "(" + data.overs + ")";
            }

            if (data.runRate) {
                sbRR.textContent = "CRR " + data.runRate;
                if (!data.requiredRunRate) {
                    scoreboardMeta.classList.remove("has-target");
                    scoreMetricTarget.classList.add("is-hidden");
                    scoreMetricA.textContent = "CRR " + data.runRate;
                }
            }

            if (data.requiredRunRate) {
                const needText = data.requiredRuns !== undefined && data.ballsRemaining !== undefined
                    ? `Need ${data.requiredRuns} off ${data.ballsRemaining}`
                    : (data.requiredRunInfo || "Need -");
                const targetValue = data.target ?? data.targetScore ?? data.chaseTarget ?? data.targetRuns ?? overlayState.target;
                if (targetValue !== undefined && targetValue !== null && targetValue !== "") {
                    overlayState.target = targetValue;
                    scoreMetricTarget.textContent = `Target ${targetValue}`;
                    scoreMetricTarget.classList.remove("is-hidden");
                    scoreboardMeta.classList.add("has-target");
                } else {
                    scoreMetricTarget.classList.add("is-hidden");
                    scoreboardMeta.classList.remove("has-target");
                }
                scoreMetricA.textContent = needText;
                scoreMetricB.textContent = "RRR " + data.requiredRunRate;
            } else if (data.projectedScore !== undefined) {
                scoreboardMeta.classList.remove("has-target");
                scoreMetricTarget.classList.add("is-hidden");
                scoreMetricB.textContent = "Projected " + data.projectedScore;
            }

            if (data.bat1 !== undefined) {
                const newBat1 = data.bat1 || "";

                if (newBat1 !== matchState.bat1) {
                    bat1.classList.remove("strikeMove");
                    void bat1.offsetWidth;
                    bat1.classList.add("strikeMove");
                }

                matchState.bat1 = newBat1;
                bat1.textContent = displayBatterName(newBat1);
            }

            if (data.bat1Score) {
                bat1Score.textContent = data.bat1Score;
                if (bat1Sr) bat1Sr.textContent = formatStrikeRate(data.bat1Score);
            }

            if (data.bat2 !== undefined) {
                const newBat2 = data.bat2 || "";

                if (newBat2 !== matchState.bat2) {
                    bat2.classList.remove("strikeMove");
                    void bat2.offsetWidth;
                    bat2.classList.add("strikeMove");
                }

                matchState.bat2 = newBat2;
                bat2.textContent = displayBatterName(newBat2);
            }

            if (data.bat2Score) {
                bat2Score.textContent = data.bat2Score;
                if (bat2Sr) bat2Sr.textContent = formatStrikeRate(data.bat2Score);
            }

            if (data.bowlerName !== undefined) {
                setScoreboardBowlerName(data.bowlerName);
            }

            if (data.bowlerStats !== undefined)
                bowlerStats.textContent = data.bowlerStats;

            if (data.thisOver !== undefined) {
                renderBalls(data.thisOver || "");

                const balls = String(data.thisOver || "")
                    .split(" ")
                    .filter(b => b.trim() !== "");
                const lastBall = balls[balls.length - 1] || "";

                const bar = document.getElementById("scoreboard");

                if (lastBall && lastBall !== lastBallShown) {
                    lastBallShown = lastBall;

                    if (lastBall === "4") {
                        bar.classList.add("boundaryGlow");
                        setTimeout(() => bar.classList.remove("boundaryGlow"), 800);
                    }

                    if (lastBall === "6") {
                        bar.classList.add("boundaryGlow");
                        setTimeout(() => bar.classList.remove("boundaryGlow"), 800);
                    }
                }
            }
        });

        channel.bind('scorecard', data => {
            if (!data) return;

            if (!data.batting) data.batting = [];
            if (!data.bowling) data.bowling = [];

            const container = document.getElementById("scorecardContainer");
            container.style.display = "block";
            if (scoreboardBar) scoreboardBar.classList.remove("show");
            //if (scorecardDim) scorecardDim.classList.remove("show");

            // build batting table
            let battingHTML = "<h3>Batting</h3>";
            battingHTML += "<table>";

            safeArray(data.batting).forEach(p => {
                battingHTML += `
                                                                                                          <tr>
                                                                                                            <td>${p.name}</td>
                                                                                                            <td>${p.runs} (${p.balls})</td>
                                                                                                            <td>${p.out ? p.dismissal : "not out"}</td>
                                                                                                          </tr>
                                                                                                        `;
            });

            battingHTML += "</table>";

            // bowling
            let bowlingHTML = "<h3>Bowling</h3><table>";

            safeArray(data.bowling).forEach(b => {
                bowlingHTML += `
                                                                                                          <tr>
                                                                                                            <td>${b.name}</td>
                                                                                                            <td>${b.overs}</td>
                                                                                                            <td>${b.runs}/${b.wickets}</td>
                                                                                                          </tr>
                                                                                                        `;
            });

            bowlingHTML += "</table>";

            container.innerHTML = `
                                                                                                <h2>${data.teamA} vs ${data.teamB}</h2>
                                                                                                ${battingHTML}
                                                                                                ${bowlingHTML}
                                                                                                <div>Total: ${data.total}/${data.wickets} (${data.overs})</div>
                                                                                              `;
        });

        channel.bind('fullScorecard', data => {
            if (!data) return;
            const container = document.getElementById('fullScorecard');
            if (!container) return;


            data.batsmen = data.batsmen || {};
            data.playingXI = data.playingXI || [];
            data.bowlers = data.bowlers || [];

            // ===== HIDE =====
            if (data.hide) {
                isFullScorecardVisible = false;
                suppressBrandingForGraphic = false;

                container.style.display = "none";
                container.innerHTML = "";
                const bowlingCard = document.getElementById("bowlingCard");
                if (bowlingCard) {
                    bowlingCard.style.display = "none";
                    bowlingCard.innerHTML = "";
                }

                if (!data.bowlers || data.bowlers.length === 0) {
                    if (scoreboardBar) scoreboardBar.classList.add("show");
                }
                if (scorecardDim) scorecardDim.classList.remove("show");
                applyBrandingState();

                return;
            }

            isFullScorecardVisible = true;
            suppressBrandingForGraphic = true;
            applyBrandingState();

            if (scoreboardBar) scoreboardBar.classList.remove("show");
            if (scorecardDim) scorecardDim.classList.remove("show");

            if (data.bowlingOnly) {
                container.style.display = "none";
                container.innerHTML = "";
                showBowlingCard(data);
                return;
            }

            // ===== EXTRAS FIX =====
            let extras = 0;
            if (typeof data.extras === "object") {
                extras =
                    (data.extras.wide || 0) +
                    (data.extras.noball || 0) +
                    (data.extras.bye || 0) +
                    (data.extras.legbye || 0);
            } else {
                extras = data.extras || 0;
            }

            // ===== BUILD 11 PLAYERS =====

            // ===== RENDER =====
            let rows = "";
            const players = data.playingXI || [];
            const striker = data.striker || null;
            const safeBatsmen = data.batsmen || {};
            const xiNames = new Set(players);
            const statOrder = new Map(Object.keys(safeBatsmen).map((name, index) => [name, index]));
            const getScorecardOrder = (name) => {
                return statOrder.get(name) ?? 999;
            };
            const battedPlayers = Object.keys(safeBatsmen)
                .filter(name => xiNames.has(name))
                .sort((a, b) => getScorecardOrder(a) - getScorecardOrder(b));
            const shownPlayers = new Set();

            battedPlayers.forEach(name => {
                const s = data.batsmen[name];

                const isNotOut = !s.out;
                const isStriker = striker === name;
                const dismissalParts = formatScorecardDismissal(isNotOut ? "not out" : (s.dismissal || ""));
                const hasBowler = Boolean(dismissalParts.bowler);
                const runs = formatScorecardStatNumber(s.runs);
                const balls = formatScorecardStatNumber(s.balls);
                shownPlayers.add(name);

                rows += `
                                                                                        <tr class="${isNotOut ? 'not-out-row' : ''} ${isStriker ? 'striker-row' : ''}">
                                                                                            <td class="player">
                                                                                    ${formatScorecardBatter(name)}
                                                                                    ${isStriker ? '<span class="strike-star">&#9733;</span>' : ''}
                                                                                            </td>
                                                                                            ${hasBowler
                                                                                                ? `<td class="dismissal">${dismissalParts.dismissal}</td><td class="bowler">${dismissalParts.bowler}</td>`
                                                                                                : `<td class="dismissal" colspan="2">${dismissalParts.dismissal}</td>`}
                                                                                            <td class="runs">${escapeHtml(runs)}</td>
                                                                                            <td class="balls">${escapeHtml(balls)}</td>
                                                                                        </tr>
                                                                                    `;
            });

            // Then show remaining players by name only.
            players
                .filter(name => !shownPlayers.has(name))
                .forEach(name => {
                    rows += `
                                                                                        <tr>
                                                                                            <td class="player">${formatScorecardBatter(name)}</td>
                                                                                            <td class="dismissal" colspan="2"></td>
                                                                                            <td class="runs"></td>
                                                                                            <td class="balls"></td>
                                                                                        </tr>
                                                                                    `;
                });

            let showLastWicketBar = false;

            if (data.lastWicket && lastDismissalShown === data.lastWicket) {
                showLastWicketBar = true;
            }

            let bowlingHTML = "";

            (data.bowlers || []).forEach(b => {
                bowlingHTML += `
                                                                                    <tr>
                                                                                        <td>${b.name}</td>
                                                                                        <td>${b.overs}</td>
                                                                                        <td>${b.runs}</td>
                                                                                        <td>${b.wickets}</td>
                                                                                    </tr>
                                                                                `;
            });

            const isTeamABatting = (data.team || overlayState.battingTeam) === overlayState.teamA;
            const fallbackColors = isTeamABatting ? overlayState.teamAColors : overlayState.teamBColors;
            const primary = normalizeHexColor(data.teamPrimaryColor, fallbackColors.primary);
            const accent = normalizeHexColor(data.teamAccentColor, fallbackColors.accent);
            const text = normalizeHexColor(data.teamTextColor, fallbackColors.text || "#FFFFFF");
            const teamLogo = data.teamLogo || (isTeamABatting ? overlayState.teamALogo : overlayState.teamBLogo);
            const scoreText = String(data.score || "0/0").replace("/", "-");
            const cardStyle = `--batting-primary:${primary};--batting-accent:${accent};--batting-text:${text};`;

            container.innerHTML = `
                                                                                            <div class="tv-card scorecard-card full-screen-scorecard" style="${cardStyle}">
                                                                                                <div class="scorecard-hero-header">
                                                                                                    <div class="scorecard-header-logo">
                                                                                                        ${teamLogo ? `<img src="${escapeHtml(teamLogo)}" alt="">` : ""}
                                                                                                    </div>
                                                                                                    <div class="scorecard-title-wrap">
                                                                                                        <div class="scorecard-team-title">${escapeHtml((data.team || "").toUpperCase())}</div>
                                                                                                        <div class="scorecard-subtitle">BATTING SCORECARD</div>
                                                                                                    </div>
                                                                                                </div>

                                                                                                <div class="scorecard-main">
                                                                                                    <div class="scorecard-table-wrap">
                                                                                                        <table class="tv-table">
                                                                                                            <colgroup>
                                                                                                                <col class="col-player">
                                                                                                                <col class="col-dismissal">
                                                                                                                <col class="col-bowler">
                                                                                                                <col class="col-runs">
                                                                                                                <col class="col-balls">
                                                                                                            </colgroup>
                                                                                                            <thead>
                                                                                                                <tr>
                                                                                                                    <th class="col-player">PLAYER</th>
                                                                                                                    <th class="col-dismissal"></th>
                                                                                                                    <th class="col-bowler"></th>
                                                                                                                    <th class="col-runs">RUNS</th>
                                                                                                                    <th class="col-balls">BALLS</th>
                                                                                                                </tr>
                                                                                                            </thead>
                                                                                                            <tbody>
                                                                                                                ${rows}
                                                                                                            </tbody>
                                                                                                        </table>
                                                                                                    </div>

                                                                                                    <div class="scorecard-logo-panel">
                                                                                                        ${teamLogo ? `<img src="${escapeHtml(teamLogo)}" alt="">` : `<div class="scorecard-logo-fallback">${escapeHtml(data.team || "TEAM")}</div>`}
                                                                                                    </div>
                                                                                                </div>

                                                                                                <div class="scorecard-hero-footer">
                                                                                                    <div class="scorecard-footer-table">
                                                                                                        <div class="scorecard-footer-metric">EXTRAS ${escapeHtml(extras)}</div>
                                                                                                        <div class="scorecard-footer-metric">OVERS ${escapeHtml(data.overs || "0.0")}</div>
                                                                                                        <div></div>
                                                                                                        <div class="scorecard-footer-total">${escapeHtml(scoreText)}</div>
                                                                                                        <div></div>
                                                                                                    </div>
                                                                                                    <div></div>
                                                                                                </div>

                                                                                                ${showLastWicketBar ? `
                                                                                                    <div class="tv-lastwicket">
                                                                                                        <div class="lw-left">
                                                                                                            LAST WICKET: ${escapeHtml(data.lastWicket)}

                file = "assets/moments/four.png";

                momentImage.onerror = () => {
                    momentImage.style.display = "none";
