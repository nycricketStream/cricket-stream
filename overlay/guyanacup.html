                                    ${formatPlayer(p)}
                                </div>

                            </div>
                        `).join("")}

                    </div>

                </div>

            </div>
        `;
        }

        function formatScorecardPlayer(name) {
            return escapeHtml(stripRoleTags(name).toUpperCase());
        }

        function formatScorecardBatter(name) {
            const raw = stripRoleTags(String(name || "").replace(/\*/g, ""));
            const parts = raw.split(/\s+/).filter(Boolean);
            const displayName = parts.length > 1
                ? `${parts[0].charAt(0)}. ${parts[parts.length - 1]}`
                : raw;
            const star = String(name || "").includes("*") ? "*" : "";
            return escapeHtml((displayName + star).toUpperCase());
        }

        function formatScorecardShortName(name) {
            const clean = stripRoleTags(String(name || "").replace(/\*/g, ""));
            const parts = clean.split(/\s+/).filter(Boolean);
            if (parts.length > 1) return `${parts[0].charAt(0)}. ${parts[parts.length - 1]}`.toUpperCase();
            return clean.toUpperCase();
        }

        function formatScorecardStatNumber(value) {
            const numeric = Number(value);
            if (Number.isFinite(numeric)) return String(numeric);
            return "0";
        }

        function scorecardOversToBalls(overs) {
            const [whole, balls = "0"] = String(overs || "0.0").split(".");
            return (Number(whole) || 0) * 6 + (Number(balls) || 0);
        }

        function formatBowlingEconomy(overs, runs) {
            const balls = scorecardOversToBalls(overs);
            if (!balls) return "0.00";
            return ((Number(runs) || 0) / (balls / 6)).toFixed(2);
        }

        function formatScorecardDismissal(text) {
            const raw = String(text || "").replace(/\s+/g, " ").trim();
            if (!raw || /not\s*out/i.test(raw)) {
                return { dismissal: "NOT OUT", bowler: "" };
            }
            if (/yet\s*to\s*bat/i.test(raw)) {
                return { dismissal: "", bowler: "" };
            }

            const bowledBy = raw.match(/\bb\s+(.+)$/i);
            const bowlerName = bowledBy ? bowledBy[1].trim() : "";
            const beforeBowler = bowledBy ? raw.slice(0, bowledBy.index).trim() : raw;
            const bowler = bowlerName ? `b ${formatScorecardShortName(bowlerName)}` : "";
            let dismissal = beforeBowler;

            const caughtBy = beforeBowler.match(/^c\s+(.+)$/i);
            if (caughtBy) dismissal = `c ${formatScorecardShortName(caughtBy[1])}`;
            else if (!beforeBowler && bowlerName) dismissal = "BOWLED";
            else if (/^bowled$/i.test(beforeBowler)) dismissal = "BOWLED";
            else if (/^lbw$/i.test(beforeBowler)) dismissal = "LBW";
            else if (/^run\s*out/i.test(beforeBowler)) {
                const runOutName = beforeBowler.match(/\(([^)]+)\)/);
                dismissal = runOutName
                    ? `RUN OUT (${formatScorecardShortName(runOutName[1])})`
                    : "RUN OUT";
            } else {
                dismissal = beforeBowler.toUpperCase();
            }

            return {
                dismissal: escapeHtml(dismissal),
                bowler: escapeHtml(bowler)
            };
        }

        function formatPlayer(name) {
            const raw = String(name || "");
            const roles = [];
            if (/\(WK\)/i.test(raw)) {
                roles.push('<span class="xiRole xiRoleWk">(WK)</span>');
            }
            if (/\(C\)/i.test(raw)) {
                roles.push('<span class="xiRole xiRoleC">(C)</span>');
            }

            const cleanName = escapeHtml(stripRoleTags(raw));
            return `${cleanName}${roles.length ? ` <span class="xiRoles">${roles.join("")}</span>` : ""}`;
        }

        function showBowlingCard(data) {
            if (scoreboardBar) scoreboardBar.classList.remove("show");
            const el = document.getElementById("bowlingCard");
            if (!el) return;

            if (scoreboardBar) {
                scoreboardBar.classList.remove("show");
            }

            const isTeamABowling = (data.bowlingTeam || "") === overlayState.teamA;
            const fallbackColors = isTeamABowling ? overlayState.teamAColors : overlayState.teamBColors;
            const primary = normalizeHexColor(
                isTeamABowling ? data.teamAPrimaryColor : data.teamBPrimaryColor,
                fallbackColors.primary
            );
            const accent = normalizeHexColor(
                isTeamABowling ? data.teamAAccentColor : data.teamBAccentColor,
                fallbackColors.accent
            );
            const text = normalizeHexColor(
                isTeamABowling ? data.teamATextColor : data.teamBTextColor,
                fallbackColors.text || "#FFFFFF"
            );
            const bowlingLogo = data.bowlingTeamLogo || (isTeamABowling ? (data.teamALogo || overlayState.teamALogo) : (data.teamBLogo || overlayState.teamBLogo));
            const bowlers = [...(data.bowlers || [])];
            const bowlerDensityClass = bowlers.length > 7 ? " many-bowlers" : "";
            const bowlerRowCapacity = bowlers.length > 7 ? 11 : (bowlers.length > 4 ? 9 : 7);
            const cardStyle = `--bowling-primary:${primary};--bowling-accent:${accent};--bowling-text:${text};--bowler-row-capacity:${bowlerRowCapacity};`;
            const teamName = (data.bowlingTeam || "BOWLING").toUpperCase();

            let rows = "";
            bowlers.forEach((b, index) => {
                const maidens = b.maidens === undefined || b.maidens === null || b.maidens === "" ? 0 : b.maidens;
                const overs = b.overs || "0.0";
                const economy = b.economy || b.econ || formatBowlingEconomy(overs, b.runs);
                rows += `
                    <tr>
                        <td class="bowler-name-cell">${formatScorecardBatter(b.name)}</td>
                        <td class="bowler-stat-cell">${escapeHtml(overs)}</td>
                        <td class="bowler-stat-cell">${escapeHtml(maidens)}</td>
                        <td class="bowler-stat-cell">${escapeHtml(b.runs ?? 0)}</td>
                        <td class="bowler-stat-cell">${escapeHtml(b.wickets ?? 0)}</td>
                        <td class="bowler-stat-cell">${escapeHtml(economy)}</td>
                    </tr>
                `;
            });

            if (!rows) {
                rows = `
                    <tr>
                        <td class="bowler-name-cell">NO BOWLERS YET</td>
                        <td class="bowler-stat-cell">0.0</td>
                        <td class="bowler-stat-cell">0</td>
                        <td class="bowler-stat-cell">0</td>
                        <td class="bowler-stat-cell">0</td>
                        <td class="bowler-stat-cell">0.00</td>
                    </tr>
                `;
            }

            const fowItems = Array.isArray(data.fallOfWickets) ? data.fallOfWickets.slice(0, 10) : [];
            const fowCells = Array.from({ length: 10 }, (_, index) => {
                const wicket = fowItems[index];
                return `
                    <span>
                        <b>${index + 1}</b>
                        <em>${escapeHtml(wicket?.score || "")}</em>
                    </span>
                `;
            }).join("");

            el.innerHTML = `
                <div class="tv-card bowling-card full-screen-bowling-card${bowlerDensityClass}" style="${cardStyle}">
                    <div class="bowling-score-header">
                        ${bowlingLogo
                            ? `<img class="bowling-score-logo" src="${escapeHtml(bowlingLogo)}" alt="">`
                            : `<div class="bowling-score-logo blank">${escapeHtml(teamName.slice(0, 2))}</div>`}
                        <div>
                            <div class="bowling-score-title">${escapeHtml(teamName)}</div>
                            <div class="bowling-score-subtitle">Bowling Scorecard</div>
                        </div>
                    </div>

                    <div class="bowling-score-main">
                        <div class="bowling-score-table-wrap">
                            <div class="bowling-stat-ribbon">
                                <span>Overs</span>
                                <span>Maidens</span>
                                <span>Runs</span>
                                <span>Wickets</span>
                                <span>Economy</span>
                            </div>
                            <table class="bowling-score-table">
                                <colgroup>
                                    <col class="bowler-name">
                                    <col class="bowler-stat">
                                    <col class="bowler-stat">
                                    <col class="bowler-stat">
                                    <col class="bowler-stat">
                                    <col class="bowler-stat">
                                </colgroup>
                                <tbody>${rows}</tbody>
                            </table>
                            <div class="bowling-fow-strip">
                                <strong>Fall Of Wickets</strong>
                                ${fowCells}
                            </div>
                        </div>
                    </div>

                    <div class="bowling-score-footer">
                        <div>Extras ${escapeHtml(data.extras ?? 0)}</div>
                        <div class="footer-center">Overs ${escapeHtml(data.overs || "0.0")}</div>
                        <div class="footer-score">${escapeHtml(String(data.score || "0/0").replace("/", "-"))}</div>
                    </div>
                </div>
            `;

            // ===== SHOW =====
            el.style.display = "none"; // reset
            el.offsetHeight; // force reflow

            el.style.display = "block";
            el.style.opacity = "1";
            el.style.transform = "none";
            if (scorecardDim) scorecardDim.classList.add("show");
            isFullScorecardVisible = true;

            setTimeout(() => {
                const card = el.querySelector(".tv-card");
                if (card) card.classList.add("show");
            }, 50);
        }

        function showWicketSequence(data) {

            // ===== MAIN WICKET =====
            showWicket(data);

            // after wicket animation
            setTimeout(() => {

                // hide main wicket
                wicketGraphic.classList.remove("show");

                // ===== FALL OF WICKET =====
                showFallOfWicket(data);

                if (fallWicketGraphic) {
                    fallWicketGraphic.classList.add("show");
                }

                // hide fall of wicket
                setTimeout(() => {
                    fallWicketGraphic.classList.remove("show");
                }, 2500);

            }, 3000); // after main wicket finishes
        }

        function sendOverlayState(state) {
            fetch('/api/broadcast', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    event: 'overlayState',
                    data: { state: state }
                })
            });
        }

        function renderBalls(over) {

            thisOverBalls.innerHTML = "";

            const balls = String(over || "")
                .split(" ")
                .filter(b => b.trim() !== "");

            balls.forEach((b, i) => {
                const el = document.createElement("span");
                el.className = "ball";

                let label = b;

                if (b === "4") el.classList.add("four");
                else if (b === "6") el.classList.add("six");
                else if (b === "W") el.classList.add("wicket");

                else if (b === "Wd" || b === "WD") {
                    el.classList.add("extra");
                    label = "WD";
                }

                else if (b === "Nb" || b === "NB") {
                    el.classList.add("extra");
                    label = "NB";
                }

                else if (/^\d+(wd|nb|b|lb)$/i.test(b)) {
                    el.classList.add("extra", "long");
                    label = b.replace(/wd$/i, "Wd").replace(/nb$/i, "Nb").replace(/lb$/i, "Lb");
                }

                if (String(label).length > 2) {
                    el.classList.add("long");
                }

                el.textContent = label;

                if (i === balls.length - 1) {
                    el.classList.add("lastBall");
                }

                thisOverBalls.appendChild(el);
            });
        }

        function showPartnership(data) {
            if (!data) return;

            log("RENDER PARTNERSHIP:", data);

            // ✅ Runs + Balls (you already use these correctly)
            if (partnershipRuns) {
                partnershipRuns.textContent = (data.runs || 0) + " RUNS";
            }

            if (partnershipBalls) {
                partnershipBalls.textContent = (data.balls || 0) + " BALLS";
            }

            // ✅ PLAYERS (THIS IS WHAT YOU ARE MISSING)
            const container = document.getElementById("partnershipPlayers");

            if (container) {
                const batOneName = displayBatterName(data.bat1 || "");
                const batTwoName = displayBatterName(data.bat2 || "");
                container.innerHTML = `
                                                            <div style="display:flex;align-items:center;gap:16px">

                                                                <div style="text-align:center">
                                                                    <img src="${data.bat1Img || ''}"
                                                                         style="width:50px;height:50px;border-radius:50%;object-fit:cover">
                                                                    <div>${batOneName}</div>
                                                                </div>

                                                                <div style="font-weight:700">+</div>

                                                                <div style="text-align:center">
                                                                    <img src="${data.bat2Img || ''}"
                                                                         style="width:50px;height:50px;border-radius:50%;object-fit:cover">
                                                                    <div>${batTwoName}</div>
                                                                </div>

                                                            </div>
                                                        `;
            }

            // SHOW GRAPHIC
            partnershipGraphic.classList.add("show");

            setTimeout(() => {
                partnershipGraphic.classList.remove("show");
            }, 4500);
        }

        function applySceneMode() {
            let opacity = 0.75;

            // normalize input (fixes case issues)
            const mode = (sceneMode || "").toLowerCase();

            if (mode === "bright") opacity = 0.85;
            else if (mode === "dark") opacity = 0.6;
            else if (mode === "normal") opacity = 0.75;

            const targets = [
                "bowlerLowerThird",
                "batsmanLowerThird",
                "playerGraphic"
            ];

            targets.forEach(id => {
                const el = document.getElementById(id);
                if (!el) return;

                if (id === "bowlerLowerThird") {
                    el.style.background = `
                                                            linear-gradient(90deg,
                                                                color-mix(in srgb, var(--bowling-primary) ${Math.round(opacity * 100)}%, #000 ${100 - Math.round(opacity * 100)}%),
                                                                rgba(7,20,38,${opacity})
                                                            )
                                                        `;
                    return;
                }

                el.style.background = `
                                                            linear-gradient(90deg,
                                                                rgba(2,6,23,${opacity}),
                                                                rgba(15,23,42,${opacity})
                                                            )
                                                        `;
            });
        }

        function showMoment(type) {
            let glow = "#facc15";
            let text = type;

            if (type === "FOUR" || type === "4" || type === "SIX" || type === "6") {
                glow = getComputedStyle(document.documentElement).getPropertyValue("--batting-accent").trim() || glow;
            }
            if (type === "WICKET" || type === "W" || type === "HATTRICK") {
                glow = getComputedStyle(document.documentElement).getPropertyValue("--bowling-accent").trim() || "#ef4444";
            }

            momentGlow.style.background = glow;

            momentFallback.textContent = text;
            momentFallback.style.display = "block";

            momentStinger.style.opacity = "1";

            momentFallback.style.animation = "momentIn .45s forwards";

            setTimeout(() => {
                momentFallback.style.animation = "momentOut .35s forwards";

                setTimeout(() => {
                    momentStinger.style.opacity = "0";
                }, 350);

            }, 2200);
        }

        function showTicker(text) {
            const ticker = document.getElementById("tvTicker");
            const label = document.getElementById("tickerText");

            label.textContent = text;
            ticker.classList.add("show");

            setTimeout(() => {
                ticker.classList.remove("show");
            }, 4000);
        }

        function showWicket(data) {
            if (!data.dismissal) return;

            const player = data.dismissal
                .replace(/\d+\s*\(\d+\).*/, "")
                .trim();

            const scoreMatch = data.dismissal.match(/\d+\s\(\d+\)/);

            let score = "";

            if (scoreMatch) {
                score = scoreMatch[0];
            }

            const dismissalText =
                data.dismissal.replace(player + " " + score, "").trim();

            wicketPlayer.textContent = stripRoleTags(player).toUpperCase();
            wicketScore.textContent =
                score + " • " + dismissalText.toUpperCase();

            /* FALL OF WICKET (prepare data BEFORE queue runs) */
            fallWicketPlayer.textContent =
                stripRoleTags(player).toUpperCase() + " " + score;

            fallWicketScore.textContent =
                sbScore.textContent + " • " + sbOvers.textContent;

            wicketGraphic.classList.add("show");
        }

        function showFallOfWicket(data) {

            if (data.player) {
                fallWicketPlayer.textContent = stripRoleTags(data.player).toUpperCase();
            }
            if (data.score) {
                fallWicketScore.textContent = data.score;
            }

            /*fallWicketGraphic.classList.add("show");

            setTimeout(() => {
                fallWicketGraphic.classList.remove("show");
            }, 4000);*/
        }

        function hideTeamXI() {
            const overlay = document.getElementById("teamXIOverlay");
            const content = document.getElementById("teamXIContent");

            overlay.style.display = "none";
            content.innerHTML = "";
        }

        function renderRunWorm(data) {
            if (!data.runsPerOver) return;

            const worm = document.getElementById("runworm");
            worm.innerHTML = "";

            const overs = data.runsPerOver.slice(-10);

            overs.forEach(r => {

                const bar = document.createElement("div");
                bar.className = "wormBar";

                bar.style.height = (10 + r * 5) + "px";

                worm.appendChild(bar);
            });
        }

        function resetMatchState() {

            matchState = {
                bat1: "",
                bat2: "",
                score: "0/0",
                overs: "0.0"
            };

            sbScore.textContent = "0/0";
            sbOvers.textContent = "(0.0)";
            sbRR.textContent = "RR 0.00";
            scoreMetricTarget.textContent = "Target -";
            scoreMetricTarget.classList.add("is-hidden");
            scoreboardMeta.classList.remove("has-target");
            scoreMetricA.textContent = "CRR 0.00";
            scoreMetricB.textContent = "Projected -";

            bat1.textContent = "";
            bat1Score.textContent = "";

            bat2.textContent = "";
            bat2Score.textContent = "";

            setScoreboardBowlerName("");
            bowlerStats.textContent = "";
            sbBowler.classList.remove("hasBowler");

            thisOverBalls.innerHTML = "";

            lastScore = "";
            lastBallShown = "";
            lastDismissalShown = "";

            partnershipRunCount = 0;
            partnershipBallCount = 0;

            // FORCE CLEAR BALL UI
            renderBalls("");

            log("✅ FULL RESET DONE");
        }

        function log(...args) {
            if (DEBUG) console.log(...args);
        }

        applySceneMode();
    </script>
