<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cricket Broadcast Dashboard</title>
<script src="https://js.pusher.com/8.2/pusher.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI,Arial;background:#060b18;color:#e5e7eb;display:flex}
.sidebar{width:260px;background:linear-gradient(180deg,#081a3a,#030712);height:100vh;padding:18px 14px;border-right:1px solid rgba(59,130,246,.25)}
.sidebar h2{margin-top:0;color:#60a5fa}
.tab-btn{width:100%;padding:12px;margin-bottom:12px;border:none;border-radius:10px;background:#0a1226;color:white;text-align:left;cursor:pointer}
.tab-btn.active{background:#2563eb}
.main{flex:1;padding:28px}
.tab{display:none;background:#0c1426;padding:26px;border-radius:16px}
.tab.active{display:block}
input,textarea,select{width:100%;padding:10px;margin-bottom:14px;border-radius:8px;border:1px solid #1f2937;background:#020617;color:#fff}
button{width:100%;padding:10px;border:none;border-radius:8px;background:#1d4ed8;color:white;cursor:pointer;margin-top:8px}
.flexRow{display:flex;gap:10px}
.flexCol{flex:1}
</style>
</head>
<body>

<div class="sidebar">
<h2>Broadcast</h2>
<button class="tab-btn active" onclick="showTab(event,'match')">Match Setup</button>
<button class="tab-btn" onclick="showTab(event,'scoring')">Live Scoring</button>
<button class="tab-btn" onclick="showTab(event,'player')">Player Graphic</button>
</div>

<div class="main">

<!-- MATCH SETUP -->
<div id="match" class="tab active">
<h3>Match Setup</h3>

Team A<input id="teamA">
Team A Players<textarea id="teamAPlayers"></textarea>

Team B<input id="teamB">
Team B Players<textarea id="teamBPlayers"></textarea>

Batting Team<select id="batting"></select>

Innings<select id="innings">
<option value="1">1st Innings</option>
<option value="2">2nd Innings</option>
</select>

Total Overs<input id="maxOvers" value="20">

Target<input id="target">

<button onclick="initPlayers()">Update Match</button>
</div>

<!-- LIVE SCORING -->
<div id="scoring" class="tab">
<h3>Live Scoring</h3>

<div style="font-size:22px;margin-bottom:15px">
<strong>Total:</strong> <span id="liveScore">0/0</span><br>
<strong>Overs:</strong> <span id="liveOvers">0.0</span><br>
<strong>Run Rate:</strong> <span id="liveRR">0.00</span>
</div>

<h4>Striker</h4>
<select id="striker"></select>

<h4>Non-Striker</h4>
<select id="nonStriker"></select>

<h4>Bowler</h4>
<select id="bowlerSelect"></select>

<button onclick="rotateStrike()">Manual Rotate</button>
<button onclick="undoLast()">Undo Last Ball</button>

<h4>Runs</h4>

<div class="flexRow">

<div class="flexCol">
<button onclick="addRuns(0)">0</button>
<button onclick="addRuns(1)">1</button>
<button onclick="addRuns(2)">2</button>
<button onclick="addRuns(3)">3</button>
<button onclick="addRuns(4)">4</button>
<button onclick="addRuns(6)">6</button>
</div>

<div class="flexCol">
<h4>Extras</h4>
<button onclick="addExtra('wide')">Wide</button>
<button onclick="addExtra('noball')">No Ball</button>
<button onclick="addExtra('bye')">Bye</button>
<button onclick="addExtra('legbye')">Leg Bye</button>
</div>

<div class="flexCol">
<h4>Wicket</h4>
<button onclick="addWicket()">Add Wicket</button>
</div>

</div>

</div>

<!-- PLAYER GRAPHIC -->
<div id="player" class="tab">
<h3>Player Lower Third</h3>
Player<select id="playerSelect"></select>
Handedness<select id="handed">
<option value="Right-Hand">Right-Hand</option>
<option value="Left-Hand">Left-Hand</option>
</select>
Player Image URL<input id="playerImg">
<button onclick="showPlayer()">Show Player</button>
</div>

</div>

<script>
async function send(event,data){
 await fetch('/api/broadcast',{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({event,data})
 });
}

/* ===== AUTO BINDING ===== */

function updateBattingTeams(){
 batting.innerHTML="";
 if(teamA.value) batting.add(new Option(teamA.value,teamA.value));
 if(teamB.value) batting.add(new Option(teamB.value,teamB.value));
 updatePlayerDropdown();
 updateBowlerDropdown();
}

function updatePlayerDropdown(){
 let players=[];
 if(batting.value===teamA.value){
  players=teamAPlayers.value.split('\n');
 } else if(batting.value===teamB.value){
  players=teamBPlayers.value.split('\n');
 }
 playerSelect.innerHTML="";
 striker.innerHTML="";
 nonStriker.innerHTML="";
 players.map(p=>p.trim()).filter(Boolean).forEach(p=>{
  playerSelect.add(new Option(p,p));
  striker.add(new Option(p,p));
  nonStriker.add(new Option(p,p));
 });
}

function updateBowlerDropdown(){
 let players=[];
 if(batting.value===teamA.value){
  players=teamBPlayers.value.split('\n');
 } else if(batting.value===teamB.value){
  players=teamAPlayers.value.split('\n');
 }
 bowlerSelect.innerHTML="";
 players.map(p=>p.trim()).filter(Boolean).forEach(p=>{
  bowlerSelect.add(new Option(p,p));
 });
}

teamA.addEventListener('input',updateBattingTeams);
teamB.addEventListener('input',updateBattingTeams);
teamAPlayers.addEventListener('input',updatePlayerDropdown);
teamBPlayers.addEventListener('input',updatePlayerDropdown);
batting.addEventListener('change',()=>{
 updatePlayerDropdown();
 updateBowlerDropdown();
});

/* ===== SCORING ENGINE ===== */

let total=0,wkts=0,balls=0;
let history=[];

function calculateOvers(){return Math.floor(balls/6)+"."+(balls%6);}
function runRate(){return balls?(total/(balls/6)).toFixed(2):"0.00";}

function updateDisplay(){
 liveScore.innerText=total+"/"+wkts;
 liveOvers.innerText=calculateOvers();
 liveRR.innerText=runRate();
 pushScore();
}

function addRuns(r){
 history.push({type:'run',runs:r});
 total+=r;balls++;
 if(r%2===1)rotateStrike();
 if(balls%6===0)rotateStrike();
 updateDisplay();
}

function addExtra(type){
 history.push({type:'extra',extra:type});
 total++;
 if(type==="bye"||type==="legbye") balls++;
 updateDisplay();
}

function addWicket(){
 history.push({type:'wicket'});
 wkts++;balls++;
 updateDisplay();
}

function undoLast(){
 let last=history.pop();
 if(!last) return;
 if(last.type==='run'){ total-=last.runs; balls--; }
 if(last.type==='extra'){ total--; if(last.extra==="bye"||last.extra==="legbye") balls--; }
 if(last.type==='wicket'){ wkts--; balls--; }
 updateDisplay();
}

function rotateStrike(){
 let t=striker.value;
 striker.value=nonStriker.value;
 nonStriker.value=t;
}

function pushScore(){
 send('score',{
  live:true,
  total:total,
  wickets:wkts,
  overs:calculateOvers(),
  runRate:runRate(),
  striker:striker.value,
  nonStriker:nonStriker.value,
  bowler:bowlerSelect.value
 });
}

function showPlayer(){
 send('player',{
  team:batting.value,
  label:'NEW BATSMAN',
  name:playerSelect.value,
  hand:handed.value,
  image:playerImg.value
 });
}

function showTab(evt,id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 if(evt) evt.target.classList.add('active');
}
</script>

</body>
</html>
