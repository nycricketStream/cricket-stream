<!DOCTYPE html>
<html>
   <head>
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <meta charset="UTF-8">
      <title>Cricket Broadcast Dashboard - by Manoj K</title>
      <script src="https://js.pusher.com/8.2/pusher.min.js"></script>
      <style>
      body{
           margin:0;
           font-family:Segoe UI,Arial;
           background:#020617;
           color:white;
         }
         
         /* TOP BAR */
         .topbar{
           display:flex;
           justify-content:space-between;
           align-items:center;
           padding:10px 20px;
           background:#0f172a;
         }
         
         .layout{
           display:grid;
           grid-template-columns:300px 1fr 300px;
           height:calc(100vh - 60px);
           gap:10px;
           padding:10px;
         }
         
         .panel{
           background:#020617;
           border:1px solid #1f2937;
           border-radius:10px;
           padding:12px;
         }
         
         .center{
           display:flex;
           flex-direction:column;
           align-items:center;
           justify-content:center;
         }
         
         .score-display{
           text-align:center;
           margin-bottom:20px;
         }
         
         #liveScoreBig{
           font-size:64px;
           font-weight:800;
         }
         
         #liveOversBig{
           font-size:20px;
           color:#94a3b8;
         }
         
         .run-grid{
           display:grid;
           grid-template-columns:repeat(4,1fr);
           gap:10px;
           width:100%;
         }
         
         .run-grid button{
           padding:20px;
           font-size:22px;
           border-radius:8px;
           border:none;
           background:#1e293b;
           color:white;
         }
         
         .four{background:#2563eb;}
         .six{background:#16a34a;}
         .wicket{background:#dc2626;}
         .undo{background:#475569;}
         
         .extras{
           margin-top:10px;
           display:grid;
           grid-template-columns:repeat(2,1fr);
           gap:10px;
         }
         
         input,textarea,select{
           width:100%;
           margin-bottom:10px;
           padding:8px;
           background:#020617;
           border:1px solid #1f2937;
           color:white;
         }
      </style>
   </head>
   <body>
     <div id="app">
         <!-- TOP BAR -->
         <div class="topbar">
            <div class="match-info">
               <span id="topTeams">TEAM A vs TEAM B</span>
               <span id="topScore">0/0 (0.0)</span>
            </div>
            <div class="top-actions">
               <button onclick="resetMatch()">Reset</button>
               <button onclick="saveMatchToCloud()">Save</button>
               <button onclick="loadMatchFromCloud()">Load</button>
            </div>
         </div>
         <!-- MAIN GRID -->
         <div class="layout">
            <!-- LEFT -->
            <div class="panel side">
               <h3>Match Setup</h3>
               <input id="teamA" placeholder="Team A">
               <input id="teamB" placeholder="Team B">
               <textarea id="teamAPlayers" placeholder="Team A Players"></textarea>
               <textarea id="teamBPlayers" placeholder="Team B Players"></textarea>
               <select id="batting"></select>
               <button onclick="updateMatch()">Start Match</button>
            </div>
            <!-- CENTER -->
            <div class="panel center">
               <div class="score-display">
                  <div id="liveScoreBig">0/0</div>
                  <div id="liveOversBig">0.0 overs</div>
               </div>
               <div class="run-grid">
                  <button onclick="addRun(0)">0</button>
                  <button onclick="addRun(1)">1</button>
                  <button onclick="addRun(2)">2</button>
                  <button onclick="addRun(3)">3</button>
                  <button onclick="addRun(4)" class="four">4</button>
                  <button onclick="addRun(6)" class="six">6</button>
                  <button onclick="addWicket()" class="wicket">W</button>
                  <button onclick="undoLast()" class="undo">UNDO</button>
               </div>
               <div class="extras">
                  <button onclick="scoreExtra('wide')">Wide</button>
                  <button onclick="scoreExtra('noball')">No Ball</button>
                  <button onclick="scoreExtra('bye')">Bye</button>
                  <button onclick="scoreExtra('legbye')">Leg Bye</button>
               </div>
            </div>
            <!-- RIGHT -->
            <div class="panel side">
               <h3>Players</h3>
               Striker
               <select id="striker"></select>
               Non-Striker
               <select id="nonStriker"></select>
               Bowler
               <select id="bowler"></select>
               <h3>Moments</h3>
               <button onclick="send('moment',{type:'FOUR'})">4</button>
               <button onclick="send('moment',{type:'SIX'})">6</button>
               <button onclick="send('moment',{type:'WICKET'})">W</button>
            </div>
         </div>
      </div>
      <!-- LOG PANEL UI -->
      <div id="logPanel"></div>
      <button id="logToggle">LOG</button>
      <script>
         const PUSHER_KEY=window.PUSHER_KEY||'';
         const pusher=new Pusher("12fcceaea77e52cf3626",{cluster:'us2'});
         const channel=pusher.subscribe('broadcast');
         
         let lastMoment = "";
         let lastMomentTime = 0;
         
         const teamA = document.getElementById('teamA');
         const teamB = document.getElementById('teamB');
         const batting = document.getElementById('batting');
         const teamAPlayers = document.getElementById('teamAPlayers');
         const teamBPlayers = document.getElementById('teamBPlayers');
         
         /* LOGGING SYSTEM */
         const logPanel=document.getElementById('logPanel');
         const logToggle=document.getElementById('logToggle');
         
         function log(msg){
          const time=new Date().toLocaleTimeString();
          logPanel.innerHTML+=`[${time}] ${msg}<br>`;
          logPanel.scrollTop=logPanel.scrollHeight;
         }
         
         function toggleLog(){
          logPanel.style.display=logPanel.style.display==='none'?'block':'none';
         }
         
         if(logToggle){
          logToggle.addEventListener('click',toggleLog);
         }
         window.addEventListener('keydown',e=>{
          if(e.key && e.key.toLowerCase()==='l') toggleLog();
         });
         
         pusher.connection.bind('connected',()=>log('PUSHER CONNECTED'));
         pusher.connection.bind('connecting',()=>log('PUSHER CONNECTING'));
         pusher.connection.bind('disconnected',()=>log('PUSHER DISCONNECTED'));
         
         async function send(event,data){
           await fetch('/api/broadcast',{
             method:'POST',
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({event:event,data})
           });
         }
         
         function showTab(evt,id){
          document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
          document.getElementById(id).classList.add('active');
          document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
          if(evt) evt.target.classList.add('active');
         }
         
         function updateBattingTeams(){
          const teamA=document.getElementById('teamA');
          const teamB=document.getElementById('teamB');
          const sel=document.getElementById('batting');
          sel.innerHTML='';
          if(teamA.value) sel.add(new Option(teamA.value,teamA.value));
          if(teamB.value) sel.add(new Option(teamB.value,teamB.value));
         
          updatePlayerDropdown();
          updateStrikerDropdown();   
         }
         
         function updatePlayerDropdown(){
          const teamA=document.getElementById('teamA');
          const teamB=document.getElementById('teamB');
          const teamAPlayers=document.getElementById('teamAPlayers');
          const teamBPlayers=document.getElementById('teamBPlayers');
          const batting=document.getElementById('batting');
          const dropdown=document.getElementById('playerSelect');
          if(!dropdown) return;
          dropdown.innerHTML='';
          let players=[];
          if(batting.value===teamA.value){ players=teamAPlayers.value.split('\n'); }
          else if(batting.value===teamB.value){ players=teamBPlayers.value.split('\n'); }
          players.map(p=>p.trim()).filter(Boolean).forEach(p=>dropdown.add(new Option(p,p)));
         }
         
         function updateStrikerDropdown(){
          const teamA=document.getElementById('teamA');
          const teamB=document.getElementById('teamB');
          const teamAPlayers=document.getElementById('teamAPlayers');
          const teamBPlayers=document.getElementById('teamBPlayers');
          const batting=document.getElementById('batting');
         
          const strikerSel=document.getElementById('striker');
          const nonStrikerSel=document.getElementById('nonStriker');
          const bowlerSel=document.getElementById('bowler');
         
          if(!strikerSel || !nonStrikerSel || !bowlerSel) return;
         
          strikerSel.innerHTML='';
          nonStrikerSel.innerHTML='';
          bowlerSel.innerHTML='';
         
          let batPlayers=[];
          let bowlPlayers=[];
         
          if(batting.value===teamA.value){
            batPlayers=teamAPlayers.value.split('\n');
            bowlPlayers=teamBPlayers.value.split('\n');
          } else if(batting.value===teamB.value){
            batPlayers=teamBPlayers.value.split('\n');
            bowlPlayers=teamAPlayers.value.split('\n');
          }
         
          batPlayers.map(p=>p.trim()).filter(Boolean).forEach(p=>{
          // do not allow selecting batsman already out
          if(batsmanStats[p] && batsmanStats[p].out){
            return;
          }         
          strikerSel.add(new Option(p,p));
          nonStrikerSel.add(new Option(p,p));
         
         });
         
          bowlPlayers.map(p=>p.trim()).filter(Boolean).forEach(p=>{
            bowlerSel.add(new Option(p,p));
          });
         }
         
         window.addEventListener('DOMContentLoaded',()=>{
          document.getElementById('teamA').addEventListener('input',updateBattingTeams);
          document.getElementById('teamB').addEventListener('input',updateBattingTeams);
          document.getElementById('teamAPlayers').addEventListener('input',updatePlayerDropdown);
          document.getElementById('teamBPlayers').addEventListener('input',updatePlayerDropdown);
          document.getElementById('batting').addEventListener('change',updatePlayerDropdown);
          document.getElementById('batting').addEventListener('change',updateStrikerDropdown);
          document.getElementById('teamAPlayers').addEventListener('input',updateStrikerDropdown);
          document.getElementById('teamBPlayers').addEventListener('input',updateStrikerDropdown);
          document.getElementById('bowler').addEventListener('change', function(){
          const bowler = this.value;   
            currentOverBalls = 0;
         
            if(bowler && bowler !== previousBowler){
            let stats = "0-0 (0.0)";
            
            if(bowlerStats[bowler]){
            const b = bowlerStats[bowler];
            const overs = Math.floor(b.balls/6) + "." + (b.balls % 6);
            stats = b.wickets + "-" + b.runs + " (" + overs + ")";
            }
            
            setTimeout(()=>queueGraphic({
            team:(batting.value === teamA.value ? teamB.value : teamA.value),
            label:'NEW BOWLER',
            name:bowler,
            hand:stats,
            image:''
            }),400);
            }
            
            previousBowler = bowler;
            
            updateLiveDisplay();
         });
          document.getElementById('striker').addEventListener('change', function(){
         const striker = this.value;
         
         if(!validateBatsman(striker)){
         this.value = "";
         return;
         }
          const nonStriker = document.getElementById('nonStriker').value;
         
           if(this.value && this.value === nonStriker){
           alert("Striker and Non-Striker cannot be the same player.");
           this.value = "";
           return;
          }  
             
         if(striker){
           lockedOut = false;
         
           if(awaitingNewBatsman){ 
             setTimeout(()=>queueGraphic({
               team:batting.value,
               label:'NEW BATSMAN',
               name:striker,
               hand:'',
               image:playerImages[striker] || ''
             }),400);
         
             awaitingNewBatsman = false; // reset ONLY after trigger
           }
         }
          updateLiveDisplay();
         });
            
         document.getElementById('nonStriker').addEventListener('change', function(){
          const striker = document.getElementById('striker').value;
         
           if(!validateBatsman(this.value)){
            this.value="";
            return;
         } 
          if(this.value && this.value === striker){
           alert("Striker and Non-Striker cannot be the same player.");
           this.value = "";
           return;
          }
          if(this.value){
            lockedOut = false;
          }
          updateLiveDisplay();
         });
            
         loadSavedMatch();
         loadMatchList();
         setInterval(()=>{
         updateLiveDisplay();
         },10000);
         loadSponsorPresets();
            
         /* AUTO LOAD SPONSORS */
         setTimeout(()=>{
         send('sponsor',{
         enabled:showSponsors.checked,
         list:sponsorList.value.split('\n').map(s=>s.trim()).filter(Boolean),
         interval:parseInt(rotation.value||8)
         });
         },1500);
            
         /* KEYBOARD SCORING */
         window.addEventListener("keydown",e=>{
         /* ignore if typing in input fields */
         const tag = document.activeElement.tagName;
         if(tag==="INPUT" || tag==="TEXTAREA" || tag==="SELECT"){
         return;
         }
         /* only allow when Live Scoring tab is open */
         const liveTab = document.getElementById("livescoring");
         if(!liveTab.classList.contains("active")){
         return;
         }
         if(e.key==="0") addRun(0);
         if(e.key==="1") addRun(1);
         if(e.key==="2") addRun(2);
         if(e.key==="3") addRun(3);
         if(e.key==="4") addRun(4);
         if(e.key==="6") addRun(6);
         if(e.key==="w" || e.key==="W") addWicket();
         if(e.key==="z" || e.key==="Z") undoLast();
         });
         });
         
         async function saveConfig(){
          const config={
            league:league.value,
            tournament:tournament.value,
            sponsorList:sponsorList.value,
            rotation:rotation.value
          };
         
          await fetch('/api/config',{
            method:'POST',
            headers:{
              'Content-Type':'application/json',
            },
            body:JSON.stringify(config)
          });
         
          alert('Config saved');
         }
         
         async function loadConfig(){
          const r=await fetch('/api/config');
          const c=await r.json();
          league.value=c.league||'';
          tournament.value=c.tournament||'';
          sponsorList.value=c.sponsorList||'';
          rotation.value=c.rotation||8;
          alert('Config loaded');
         }
         
         function resetMatch(){
         localStorage.removeItem("cricketMatchState");
         liveTotal=0;
         liveWickets=0;
         liveBalls=0;
         liveHistory=[];
         bowlerStats={};
         batsmanStats={};
         extrasStats={wide:0,noball:0,bye:0,legbye:0};
         previousBowler="";
         awaitingNewBatsman=false;
         currentOverBalls=0;
         lockedOut=false;
         document.getElementById('striker').value="";
         document.getElementById('nonStriker').value="";
         document.getElementById('bowler').value="";
         updateLiveDisplay();
         send('manualScore',{
          score:'0/0',
          overs:'0.0',
          runRate:'0.00',
          bat1:'',
          bat1Score:'0 (0)',
          bat2:'',
          bat2Score:'0 (0)',
          bowlerName:'',
          bowlerStats:'',
          thisOver:'',
          runsPerOver:[]
         });
         alert("Match reset");
         }
         
         /* ================= BASIC LIVE SCORING ENGINE ================= */
         
         let liveTotal = 0;
         let liveWickets = 0;
         let liveBalls = 0;
         let lastBowler = "";
         let playerImages = {};
         let battingOrder = [];
         let lastDismissal = ""; 
         let lastOutBatsman = "";
         let liveHistory = [];
         let bowlerStats = {};
         let batsmanStats = {};
         let editingBallIndex = -1;
         let partnership50Shown = false;
         let partnership100Shown = false;
         let graphicQueue = [];
         let graphicPlaying = false;
         let graphicCooldown = {};
         let previousBowler="";
         let awaitingNewBatsman=false;
         let currentOverBalls = 0;
         let currentOverBowler = "";
         let lockedOut = false;
         let lastOverNumber = 0;
         let lastSentScore = "";
         let extrasStats = {
           wide: 0,
           noball: 0,
           bye: 0,
           legbye: 0
         };
         
         function calculateOvers(){
          return Math.floor(liveBalls/6) + "." + (liveBalls % 6);
         }
         
         function calculateRR(){
          return liveBalls ? (liveTotal / (liveBalls/6)).toFixed(2) : "0.00";
         }
         
         /* =========== Calculate Required Run ============ */
         function calculateRequiredRuns(){
          const targetVal = parseInt(document.getElementById('target')?.value);
          const inningsVal = document.getElementById('innings')?.value;
         
          if(!targetVal || inningsVal !== "2nd Innings") return "-";
          return Math.max(targetVal - liveTotal, 0);
         }
         
         /* =========== Calculate Required RR =============== */
         function calculateRequiredRR(){
          const targetVal = parseInt(document.getElementById('target')?.value);
          const inningsVal = document.getElementById('innings')?.value;
          const maxOversVal = parseInt(document.getElementById('maxOvers')?.value || 20);
         
          if(!targetVal || inningsVal !== "2nd Innings") return "-";
         
          const ballsLeft = (maxOversVal * 6) - liveBalls;
          const runsLeft = targetVal - liveTotal;
         
          if(ballsLeft <= 0 || runsLeft <= 0) return "-";
         
          return (runsLeft / (ballsLeft/6)).toFixed(2);
         }
         
         /* ========== Get this Over ============ */
         function getThisOver(){ 
         let balls=[];
         let legalBalls=liveBalls%6;
         
         if(legalBalls===0 && liveBalls>0){
         legalBalls=6;
         }
         
         let counted=0;
         
         for(let i=liveHistory.length-1;i>=0;i--){
         
         const b=liveHistory[i];
         let symbol="";
         
         if(b.type==="run"){
         symbol=b.runs;
         counted++;
         }
         
         else if(b.type==="wicket"){
         symbol="W";
         counted++;
         }
         
         else if(b.type==="extra"){
         
         if(b.extra==="wide") symbol="Wd";
         if(b.extra==="noball") symbol="Nb";
         
         if(b.extra==="bye"){
         symbol="B";
         counted++;
         }
         
         if(b.extra==="legbye"){
         symbol="Lb";
         counted++;
         }
         
         }
         
         balls.unshift(symbol);
         
         if(counted===legalBalls) break;
         
         }
         
         return balls.join(" ");
         }
         
         /* ======= Update Live Display =========== */
         function updateLiveDisplay(){
         document.getElementById('liveScoreBig').innerText =
           liveTotal + "/" + liveWickets;
         
         document.getElementById('liveOversBig').innerText =
           calculateOvers() + " overs";
         
         document.getElementById('topScore').innerText =
           liveTotal + "/" + liveWickets + " (" + calculateOvers() + ")";
         
         document.getElementById('topTeams').innerText =
           teamA.value + " vs " + teamB.value;
         const currentState = liveTotal + "/" + liveWickets + "-" + liveBalls;
         
         if(currentState === lastSentScore){
           return;
         }
         
         lastSentScore = currentState;
          document.getElementById('liveScore').innerText = liveTotal + "/" + liveWickets;
          document.getElementById('liveOvers').innerText = calculateOvers();
          document.getElementById('liveRR').innerText = calculateRR();
         
          document.getElementById('liveReqRuns').innerText = calculateRequiredRuns();
          document.getElementById('liveReqRR').innerText = calculateRequiredRR();
         
          const totalExtras =
           extrasStats.wide +
           extrasStats.noball +
           extrasStats.bye +
           extrasStats.legbye;
         
         document.getElementById('liveExtras').innerText = totalExtras;
         
         const strikerName = document.getElementById('striker')?.value || "";
         const nonStrikerName = document.getElementById('nonStriker')?.value || "";
         const bowlerName = document.getElementById('bowler')?.value || "";
         
         let strikerRuns = 0;
         let strikerBalls = 0;
         let nonStrikerRuns = 0;
         let nonStrikerBalls = 0;
         let outRuns = 0;
         let outBalls = 0;
         
         if(lastOutBatsman && batsmanStats[lastOutBatsman]){
           outRuns = batsmanStats[lastOutBatsman].runs;
           outBalls = batsmanStats[lastOutBatsman].balls;
         }  
            
         if(batsmanStats[strikerName]){
         strikerRuns = batsmanStats[strikerName].runs;
         strikerBalls = batsmanStats[strikerName].balls;
         }
         
         if(batsmanStats[nonStrikerName]){
         nonStrikerRuns = batsmanStats[nonStrikerName].runs;
         nonStrikerBalls = batsmanStats[nonStrikerName].balls;
         }
         
         let bowlerRuns = 0;
         let bowlerWickets = 0;
         let bowlerOvers = "0.0";
         
         if(bowlerStats[bowlerName]){
         const b = bowlerStats[bowlerName];
         bowlerRuns = b.runs;
         bowlerWickets = b.wickets;
         bowlerOvers = Math.floor(b.balls/6) + "." + (b.balls % 6);
         }
         const thisOver=getThisOver();
         const currentOverNumber = Math.floor(liveBalls / 6);
         if(currentOverNumber !== lastOverNumber){
           lastOverNumber = currentOverNumber;
           currentOverBowler = ""; // reset for new over
         }
            
         send('manualScore',{
         score:liveTotal+"/"+liveWickets,
         overs:calculateOvers(),
         runRate:calculateRR(),
         bat1:strikerName ? strikerName+"*" : "",
         bat1Score:strikerRuns+" ("+strikerBalls+")",
         bat2:nonStrikerName,
         bat2Score:nonStrikerRuns+" ("+nonStrikerBalls+")",
         bowlerName:bowlerName,
         bowlerStats:bowlerWickets+"-"+bowlerRuns+" ("+bowlerOvers+")",
         dismissal: lastOutBatsman ? (
           lastOutBatsman + " " + outRuns + " (" + outBalls + ") " + lastDismissal
         ) : "",
         thisOver:thisOver,
         runsPerOver:getRunsPerOver()
         });
          renderBowlerStats();
          renderBatsmanStats();
          renderExtrasBreakdown();
          renderFallOfWickets();
          renderCurrentOver();
          renderOverTimeline();
          renderPartnership();
          checkPartnershipMilestones();
          renderCurrentBatters();
          renderLastWicket();
          autoSaveMatch();
         }
         
         /* ============= Render Bowler Stats ================= */
         function renderBowlerStats(){
           const body = document.getElementById('bowlerStatsBody');
           if(!body) return;
         
           body.innerHTML = '';
         
           Object.keys(bowlerStats).forEach(name=>{
             const stats = bowlerStats[name];
         
             const overs = Math.floor(stats.balls/6) + "." + (stats.balls % 6);
             const economy = stats.balls
               ? (stats.runs / (stats.balls/6)).toFixed(2)
               : "0.00";
         
             body.innerHTML += `
               <tr>
                 <td>${name}</td>
                 <td>${overs}</td>
                 <td>${stats.runs}</td>
                 <td>${stats.wickets}</td>
                 <td>${economy}</td>
               </tr>
             `;
           });
         }
         
         /* ========== Add Run ================*/
         function addRun(r){
         if(!validateBeforeBall()) return;
         const striker = document.getElementById('striker')?.value;
         const currentBowler = document.getElementById('bowler')?.value;
         
         liveHistory.push({type:'run', runs:r, bowler:currentBowler, striker:striker});
         
         liveTotal += r;
         liveBalls++;
            
         if(liveBalls % 6 === 1){
           currentOverBowler = currentBowler;
         }

         if(currentOverBowler === ""){
           currentOverBowler = currentBowler;
         }
            
         if(striker){
          ensureBatsman(striker);
          // do not update stats if batsman already out
          if(!batsmanStats[striker].out){
            batsmanStats[striker].runs += r;
            batsmanStats[striker].balls++;
         
            if(r === 4) batsmanStats[striker].fours++;
            if(r === 6) batsmanStats[striker].sixes++;
         
            checkMilestones(striker); 
          }
         }
         
         if(currentBowler){
          ensureBowler(currentBowler);
          bowlerStats[currentBowler].runs += r;
          bowlerStats[currentBowler].balls++;
         }
         
            /* AUTO MOMENTS */
         if(r === 4){
          setTimeout(()=>triggerMoment('FOUR'),200);
         }       
         if(r === 6){
          setTimeout(()=>triggerMoment('SIX'),200);
         }
         
          if(r % 2 === 1){
            rotateStrike();
          }
         
          if(liveBalls % 6 === 0){
          rotateStrike();
          setTimeout(()=>sendEndOfOverGraphic(),600);
         }
         lastBowler = currentBowler;
         if(liveBalls % 6 === 1){
           currentOverBowler = currentBowler;
         }
          updateLiveDisplay();
         }
         
         /* =============== Add Wicket ========= */
         function addWicket(){
          if(!validateBeforeBall()) return;
         
          const striker = document.getElementById('striker')?.value;
          lastOutBatsman = striker;
          const currentBowler = document.getElementById('bowler')?.value;
          const dismissal = document.getElementById('dismissalType')?.value;
          lastDismissal = dismissal + " b " + currentBowler;
         
         liveHistory.push({
         type:'wicket',
         bowler:currentBowler,
         striker:striker,
         dismissal:dismissal,
         scoreAtWicket: liveTotal,
         wicketNumber: liveWickets + 1
         });
         
         liveWickets++;
            
         if(liveBalls % 6 === 1){
           currentOverBowler = currentBowler;
         }
            
         if(currentOverBowler === ""){
           currentOverBowler = currentBowler;
         }   
            
         partnership50Shown = false;
         partnership100Shown = false;
         checkHatTrick();
          setTimeout(()=>triggerMoment('WICKET'),300);
          liveBalls++;
         
          if(striker){
            ensureBatsman(striker);
            batsmanStats[striker].balls++;
            batsmanStats[striker].out = true;
            batsmanStats[striker].dismissal = dismissal;
            batsmanStats[striker].bowler = currentBowler;
          }
         
          if(currentBowler){
            ensureBowler(currentBowler);
            bowlerStats[currentBowler].balls++;
            bowlerStats[currentBowler].wickets++;
          }
         
         if(liveBalls % 6 === 0){
         const nonStriker = document.getElementById('nonStriker')?.value;
         if(nonStriker){
         document.getElementById('striker').value = nonStriker;
         }
         document.getElementById('nonStriker').value = "";
         setTimeout(()=>sendEndOfOverGraphic(),600);
         }else{
                    // normal wicket (balls 1-5)
           document.getElementById('striker').value = "";
         }
         lockedOut = true;
         awaitingNewBatsman=true;
         showNextBatter();  
         lastBowler = currentBowler;
         if(liveBalls % 6 === 1){
           currentOverBowler = currentBowler;
         }
          updateLiveDisplay();
         }

         /* ========= Add Extra ============= */
         function addExtra(type){
          if(!validateBeforeBall()) return;

         const ballsInOver = liveBalls % 6;
         if(ballsInOver === 0 && liveBalls !== 0){
           alert("Over completed. Select a new bowler.");
           return;
         }
         
          const striker = document.getElementById('striker')?.value;
          const currentBowler = document.getElementById('bowler')?.value;
         
          liveHistory.push({type:'extra', extra:type, bowler:currentBowler, striker:striker});
         
          liveTotal++;
         
          if(extrasStats[type] !== undefined){
           extrasStats[type]++;
         }
         
         if(currentBowler){
             ensureBowler(currentBowler);           
             // wides and no balls count to bowler
             if(type === "wide" || type === "noball"){
               bowlerStats[currentBowler].runs++;
             }           
             // byes / leg byes do NOT count to bowler
             if(type === "bye" || type === "legbye"){
               // no run added to bowler
             }
            }
         
          if(type === "bye" || type === "legbye"){
            liveBalls++;
            currentOverBalls++;
         
            if(striker){
              ensureBatsman(striker);
              batsmanStats[striker].balls++;
            }
         
            if(currentBowler){
              bowlerStats[currentBowler].balls++;
            }
          }
         lastBowler = currentBowler;
         if(liveBalls % 6 === 1){
           currentOverBowler = currentBowler;
         }
          updateLiveDisplay();
         }
         
         /* ============== Score Extra ================ */
         function scoreExtra(type){
         if(!validateBeforeBall()) return;
            
         const ballsInOver = liveBalls % 6;
         if(ballsInOver === 0 && liveBalls !== 0){
           alert("Over completed. Select a new bowler.");
           return;
         }
            
         const runs = parseInt(document.getElementById("extraRuns").value);
         const striker = document.getElementById('striker')?.value;
         const currentBowler = document.getElementById('bowler')?.value;
         
          liveHistory.push({type:'extra', extra:type, runs:runs, bowler:currentBowler, striker:striker});
         
          liveTotal += runs;
         
          if(extrasStats[type] !== undefined){
            extrasStats[type] += runs;
          }
         
         /* WIDE BOUNDARY GRAPHIC */
         if(type === "wide" && runs === 5){
          triggerMoment('FOUR');
         }
         
         if(type === "noball" && runs === 5){
          triggerMoment('FOUR');
         }
         
         if(type === "noball" && runs === 7){
          triggerMoment('SIX');
         }
         
          if(currentBowler){
            ensureBowler(currentBowler);
         
            if(type === "wide" || type === "noball"){
              bowlerStats[currentBowler].runs += runs;
            }
          }
         
          if(type === "bye" || type === "legbye"){
            liveBalls++;
         
            if(striker){
              ensureBatsman(striker);
              batsmanStats[striker].balls++;
            }
         
            if(currentBowler){
              bowlerStats[currentBowler].balls++;
            }
          }
         
          if(type === "wide" || type === "noball"){
            const runsOffBat = runs - 1;
            if(runsOffBat % 2 === 1){
             rotateStrike();
            }
         }
         else{
          if(runs % 2 === 1){
            rotateStrike();
          }
         }       
          updateLiveDisplay();
         }
         
         /* ============ Undo Last =================== */
         function undoLast(){
         if(liveHistory.length === 0) return;
         liveHistory.pop();
         recalculateMatch();
         updateLiveDisplay();
         }
         
         /* =========== Rotate Strike ================ */
         function rotateStrike(){
          const strikerSel=document.getElementById('striker');
          const nonStrikerSel=document.getElementById('nonStriker');
         
          if(!strikerSel || !nonStrikerSel) return;
         
          const temp=strikerSel.value;
          strikerSel.value=nonStrikerSel.value;
          nonStrikerSel.value=temp;
         }
         
         /* =========== Validate Before Ball =========== */
         function validateBeforeBall(){
         const striker=document.getElementById('striker')?.value;
         const bowler=document.getElementById('bowler')?.value;
            
         if(!striker){
         alert("Select Striker before scoring.");
         return false;
         }
            
         if(!bowler){
         alert("Select Bowler before scoring.");
         return false;
         }
            
         if(lockedOut){
         alert("Select new batsman before continuing.");
         return false;
         }
            
         /* OVER FINISHED CHECK */
         const ballsInOver = liveBalls % 6;
         // If over is complete, block EVERYTHING until bowler changes
         if(ballsInOver === 0 && liveBalls !== 0){
            if(currentOverBowler && bowler === currentOverBowler){
             alert("Over complete. Select a new bowler.");
             return false;
           }
         }
         return true;
         }

            bowlerStats[name] = {
              balls: 0,

              wickets: 0
            };
          }
         }

            batsmanStats[name] = {

         /* =========== Render Partnership ========== */
         function renderPartnership(){

         else if(ball.type==="extra"){

          runs += r;
         
          if(ball.extra==="bye"||ball.extra==="legbye"){
          balls++;

         }

         /* ============= Get Runs Per Over ==================== */
         function getRunsPerOver(){
          let runsPerOver = [];
          let currentRuns = 0;
          let ballCount = 0;
         
          liveHistory.forEach(ball=>{
         
           if(ball.type === "run"){
            currentRuns += ball.runs;
            ballCount++;
           }
           else if(ball.type === "wicket"){
            ballCount++;
           }
           else if(ball.type === "extra"){
            // wides and no balls add runs but not balls
           if(ball.extra === "wide" || ball.extra === "noball"){
             currentRuns += ball.runs || 1;
            }
         
            // byes and leg byes count as balls
            if(ball.extra === "bye"){
             currentRuns += ball.runs || 1;
             ballCount++;
            }
            
            if(ball.extra === "legbye"){
             currentRuns += ball.runs || 1;
             ballCount++;
            }
           }
         
           if(ballCount === 6){
            runsPerOver.push(currentRuns);
            currentRuns = 0;
            ballCount = 0;
           }
          });
          if(ballCount > 0){
           runsPerOver.push(currentRuns);
          }
          return runsPerOver;
         }

         function renderCurrentOver(){

         /* =========== Recalculate Match =========== */
         function recalculateMatch(){
         liveTotal = 0;
         liveWickets = 0;
         liveBalls = 0;
         bowlerStats = {};
         batsmanStats = {};
         extrasStats = {wide:0,noball:0,bye:0,legbye:0};
         liveHistory.forEach(ball=>{
         const striker = ball.striker;
         const bowler = ball.bowler;
         if(striker) ensureBatsman(striker);
         if(bowler) ensureBowler(bowler);
         /* RUN */
         if(ball.type === "run"){
         liveTotal += ball.runs;
         liveBalls++;
         batsmanStats[striker].runs += ball.runs;
         batsmanStats[striker].balls++;
         if(ball.runs === 4) batsmanStats[striker].fours++;
         if(ball.runs === 6) batsmanStats[striker].sixes++;
         bowlerStats[bowler].runs += ball.runs;
         bowlerStats[bowler].balls++;
         }
         /* WICKET */
         if(ball.type === "wicket"){
         liveWickets++;
         liveBalls++;
         batsmanStats[striker].balls++;
         batsmanStats[striker].out = true;
         bowlerStats[bowler].balls++;
         bowlerStats[bowler].wickets++;
         }
         /* EXTRAS */
         if(ball.type === "extra"){
         const r = ball.runs ?? 1;
         liveTotal += r;
         if(extrasStats[ball.extra] !== undefined){
         extrasStats[ball.extra] += r;
         }
         if(ball.extra === "wide" || ball.extra === "noball"){
         bowlerStats[bowler].runs += r;
         }
         if(ball.extra === "bye" || ball.extra === "legbye"){
         liveBalls++;
         if(striker) batsmanStats[striker].balls++;
         if(bowler) bowlerStats[bowler].balls++;
         }
         }
         });
         }

           }        
          });
         
          if(!lastWicket){

          const stats = batsmanStats[batsman] || {runs:0,balls:0};

         /* ========== Trigger Moment ============= */
         function triggerMoment(type){
          const now = Date.now();
         
          if(lastMoment === type && (now - lastMomentTime) < 3000){
            return;
          }
         
          lastMoment = type;
          lastMomentTime = now;
         
          send('moment',{type:type});
         }
         
         /* =========== Queue Graphic ================== */
         function queueGraphic(data){
         const key = data.label + "_" + data.name;
         const now = Date.now();
         if(graphicCooldown[key] && (now - graphicCooldown[key]) < 5000){
         return;
         }
         graphicCooldown[key] = now;
         graphicQueue.push(data);
         if(!graphicPlaying){
         playNextGraphic();
         }
         }
         
         /* ========== Play Next Graphic =========================== */
         function playNextGraphic(){
          if(graphicQueue.length === 0){
           graphicPlaying = false;
           return;
          }   
          graphicPlaying = true;
          const g = graphicQueue.shift(); 
          send('player', g);
          setTimeout(()=>{
           playNextGraphic();
          },4000);
         }
         
         /* ============= Send End Of Over Graphic ============ */
         function sendEndOfOverGraphic(){
         const bowlerName = document.getElementById('bowler')?.value || "";
         const overs = calculateOvers();
         const rr = calculateRR();
         const maxOvers = parseInt(document.getElementById("maxOvers")?.value || 20);
         const overNumber = Math.floor(liveBalls/6);
         let note = "";
         if(overNumber === 6){
         note = "POWERPLAY COMPLETE";
         }
         if(overNumber === maxOvers-1){
         note = "LAST OVER COMING";
         }
         send('overSummary',{
         team: batting.value,
         score: liveTotal + "/" + liveWickets,
         overs: overs,
         rr: rr,
         bowler: bowlerName,
         note: note
         });
         }

         function checkMilestones(batsman){

          if(stats.runs >= 100 && !stats.hundredShown){         
            stats.hundredShown = true;

              label:'CENTURY',

            });

              hand:'',
              image:''
            });       
          }  
         }
         
         /* ========= Check HatTrick ============== */
         function checkHatTrick(){
          let wickets = [];
          let bowler = "";
         
          for(let i = liveHistory.length - 1; i >= 0; i--){
           const ball = liveHistory[i];
           if(ball.type === "extra"){
            continue;
           }
             
           if(!bowler){
            bowler = ball.bowler;
           }
         
           if(ball.bowler !== bowler){
            break;
           }
         
           if(ball.type === "wicket"){
            wickets.push(ball);
           }else{
            break;
           }
         
           if(wickets.length === 3){
            break;
           }        
          }
         
          if(wickets.length === 3){
           queueGraphic({
            team: batting.value,
            label:'HAT TRICK',
            name: bowler,
            hand:'3 wickets in 3 balls',
            image:''
           });
          } 
         }
         
         /* ============== Check Partnership Milestones ================= */
         function checkPartnershipMilestones(){
          let runs = 0;
          let balls = 0;
          let lastWicketIndex = -1;
         
          for(let i=0;i<liveHistory.length;i++){
           if(liveHistory[i].type==="wicket"){
            lastWicketIndex = i;
           }
          }
         
          for(let i=lastWicketIndex+1;i<liveHistory.length;i++){     
           const ball = liveHistory[i];
         
           if(ball.type==="run"){
            runs += ball.runs;
            balls++;
           }
         
           else if(ball.type==="extra"){
            const r = ball.runs || 1;
            runs += r;
         
            if(ball.extra==="bye" || ball.extra==="legbye"){
             balls++;
            }
           }
         
           else if(ball.type==="wicket"){
            balls++;
           }         
          }
         
          const striker=document.getElementById('striker')?.value||"";
          const nonStriker=document.getElementById('nonStriker')?.value||"";
         
          if(runs>=100 && !partnership100Shown){    
           partnership100Shown=true;
         
           queueGraphic({
            team:batting.value,
            label:'100 PARTNERSHIP',
            name:striker+" / "+nonStriker,
            hand:runs+" runs ("+balls+" balls)",
            image:''
           });
          } else if(runs>=50 && !partnership50Shown){
           partnership50Shown=true;
           queueGraphic({
            team:batting.value,
            label:'50 PARTNERSHIP',
            name:striker+" / "+nonStriker,
            hand:runs+" runs ("+balls+" balls)",
            image:''
           });  
          }
         }
         
         /* ========== Generate X1 ================== */
         function generateXI(team){
         const squad = document.getElementById(team==="A"?"teamASquad":"teamBSquad").value.split("\n").map(p=>p.trim()).filter(Boolean);
         const container = document.getElementById(team==="A"?"teamAXI":"teamBXI");
         container.innerHTML = "";
         
         squad.forEach(line=>{
         const parts = line.split("|");
         const name = parts[0].trim();
         const img = parts[1] ? parts[1].trim() : "";
         
         if(img){
         playerImages[name] = img;
         }
         
         const id="xi_"+team+"_"+name.replace(/\s+/g,"_");
         
         container.innerHTML+=`
         <label style="display:block;margin:4px 0">
         <input type="checkbox" class="team${team}XI" value="${name}" onchange="limitXI(this,'${team}')">
         ${name}
         </label>
         `;
         });
         }
         
         /* ============== Limit X1 ================= */
         function limitXI(box,team){
         const checked=document.querySelectorAll(".team"+team+"XI:checked");
         if(checked.length>11){
         box.checked=false;
         alert("Only 11 players allowed in Playing XI");
         }
         }
         
         /* ============== Applying Playing X1 =========== */
         function applyPlayingXI(){
         const teamAXI=[...document.querySelectorAll(".teamAXI:checked")].map(c=>c.value);
         const teamBXI=[...document.querySelectorAll(".teamBXI:checked")].map(c=>c.value);
         
         if(teamAXI.length!==11||teamBXI.length!==11){
         alert("Both teams must have 11 players");
         return;
         }
         
         document.getElementById("teamAPlayers").value=teamAXI.join("\n");
         document.getElementById("teamBPlayers").value=teamBXI.join("\n");
         
         if(batting.value === teamA.value){
         battingOrder = teamAXI.slice();
         }else{
         battingOrder = teamBXI.slice();
         }        
         updateBattingTeams();
         alert("Playing XI applied");
         }
         
         /* ============== Save Sponsor Presets =========== */
         function saveSponsorPresets(){
         const presets={
         p1:document.getElementById("preset1").value,
         p2:document.getElementById("preset2").value,
         p3:document.getElementById("preset3").value,
         p4:document.getElementById("preset4").value
         };
         localStorage.setItem("sponsorPresets",JSON.stringify(presets));
         alert("Sponsor presets saved");
         }
         
         /* ========= Trigger Preset =====================*/ 
         function triggerPreset(num){
         const presets=JSON.parse(localStorage.getItem("sponsorPresets"));
         if(!presets)return;
         const url=presets["p"+num];
         if(!url)return;
         const time=parseInt(document.getElementById("fullscreenTime").value||8)*1000;
         send('fullscreenSponsor',{image:url,duration:time});
         }
         
         /* ================ Load Sponsor Presets ============ */
         function loadSponsorPresets(){
         const presets=JSON.parse(localStorage.getItem("sponsorPresets"));
         if(!presets)return;
         document.getElementById("preset1").value=presets.p1||"";
         document.getElementById("preset2").value=presets.p2||"";
         document.getElementById("preset3").value=presets.p3||"";
         document.getElementById("preset4").value=presets.p4||"";
         }
         
         /* ========= Show Live Sub Tab ============= */
         function showLiveSubTab(tab){
           const basic = document.getElementById('basicLiveTab');
           const advanced = document.getElementById('advancedLiveTab');
           const basicBtn = document.getElementById('basicTabBtn');
           const advancedBtn = document.getElementById('advancedTabBtn');
         
           if(tab === 'basic'){
             basic.style.display = 'block';
             advanced.style.display = 'none';
             basicBtn.style.background = '#2563eb';
             advancedBtn.style.background = '#1d4ed8';
           } else {
             basic.style.display = 'none';
             advanced.style.display = 'block';
             basicBtn.style.background = '#1d4ed8';
             advancedBtn.style.background = '#2563eb';
           }
         }
         
         /* ============= Auto Save Match =============== */
         function autoSaveMatch(){
         const state={
         liveTotal,
         liveWickets,
         liveBalls,
         liveHistory,
         bowlerStats,
         batsmanStats,
         extrasStats,
         currentOverBalls,
         teamA:teamA.value,
         teamB:teamB.value,

           teamB: teamB.value,
           teamALogo: teamALogo.value,
           teamBLogo: teamBLogo.value,
           teamAPlayers: teamAPlayers.value,
           teamBPlayers: teamBPlayers.value,
           batting: batting.value,
           innings: innings.value,
           target: target.value,
           maxOvers: maxOvers.value
          };
         
          await fetch('/api/matchSetup',{
           method:'POST',
           headers:{'Content-Type':'application/json'},
           body:JSON.stringify(setup)
          });
         
          alert("Saved to cloud ✅");
         }
         
         async function loadMatchSetup(){
          const r = await fetch('/api/matchSetup');
          const s = await r.json();
         
          if(!s || !s.teamA){
           alert("No saved setup");
           return;
          }
         
          teamA.value = s.teamA || "";
          teamB.value = s.teamB || "";
          teamALogo.value = s.teamALogo || "";
          teamBLogo.value = s.teamBLogo || "";
          teamAPlayers.value = s.teamAPlayers || "";
          teamBPlayers.value = s.teamBPlayers || "";
          batting.value = s.batting || "";
          innings.value = s.innings || "";
          target.value = s.target || "";
          maxOvers.value = s.maxOvers || "";
         
          updateBattingTeams();
         
          alert("Loaded from cloud ✅");
         }
         
         async function deleteMatchSetup(){
          await fetch('/api/matchSetup',{ method:'DELETE' });
          alert("Deleted from cloud");
         }
         
         /* ================= Load Saved Match ================ */
         function loadSavedMatch(){
         const saved = localStorage.getItem("cricketMatchState");
         if(!saved) return;
         
         const state = JSON.parse(saved);        
         liveTotal = state.liveTotal;
         liveWickets = state.liveWickets;
         liveBalls = state.liveBalls;
         liveHistory = state.liveHistory;
         bowlerStats = state.bowlerStats;
         batsmanStats = state.batsmanStats;
         extrasStats = state.extrasStats;
         currentOverBalls = state.currentOverBalls;
         
         teamA.value=state.teamA;
         teamB.value=state.teamB;
         teamALogo.value=state.teamALogo||"";
         teamBLogo.value=state.teamBLogo||"";
         teamAPlayers.value = state.teamAPlayers;
         teamBPlayers.value = state.teamBPlayers;
         batting.value = state.batting;
         innings.value = state.innings;
         target.value = state.target;

         });

         /* ================= BROADCAST GRAPHICS ================= */
         function sendBreak(text){
            send('break',{
            text:text
            });
         }
         
         function hideBreak(){
            send('break',{

            });
         }

         async function saveMatchToCloud(){
           const id = prompt("Enter match name (e.g. NYC vs Titans)");
           if(!id) return;
         
           const data = {
             teamA:teamA.value,
             teamB:teamB.value,
             teamALogo:teamALogo.value,
             teamBLogo:teamBLogo.value,
             teamAPlayers:teamAPlayers.value,
             teamBPlayers:teamBPlayers.value,
             batting:batting.value,
             innings:innings.value,
             target:target.value,
             maxOvers:maxOvers.value
           };
         
           await fetch('/api/matchSetup',{
             method:'POST',
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({id,data})
           });
         
           alert("Match saved");
           loadMatchList();
         }
         
         async function loadMatchList(){
           const res = await fetch('/api/matchSetup',{method:'PUT'});
           const list = await res.json();
         
           const sel = document.getElementById('matchList');
           sel.innerHTML = "";
         
           list.forEach(id=>{
             sel.add(new Option(id,id));
           });
         }
         
         async function loadMatchFromCloud(){
           const id = document.getElementById('matchList').value;
           if(!id) return;
         
           const res = await fetch('/api/matchSetup?id='+encodeURIComponent(id));
           const data = await res.json();
         
           teamA.value = data.teamA || "";
           teamB.value = data.teamB || "";
           teamALogo.value = data.teamALogo || "";
           teamBLogo.value = data.teamBLogo || "";
           teamAPlayers.value = data.teamAPlayers || "";
           teamBPlayers.value = data.teamBPlayers || "";
           batting.value = data.batting || "";
           innings.value = data.innings || "";
           target.value = data.target || "";
           maxOvers.value = data.maxOvers || "";
         
           updateBattingTeams();
           alert("Match loaded");
         }
         
         async function deleteMatch(){
           const id = document.getElementById('matchList').value;
           if(!id) return;
         
           if(!confirm("Delete this match?")) return;
         
           await fetch('/api/matchSetup',{
             method:'DELETE',
             headers:{'Content-Type':'application/json'},
             body:JSON.stringify({id})
           });
         
           loadMatchList();
         }

         function updateMatch(){
           send('match',{
             teamA:teamA.value,
             teamB:teamB.value,
             batting:batting.value
           });
         
           send('manualScore',{
             score:'0/0',
             overs:'0.0'
           });
         }
      </script>
