<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cricket Broadcast Dashboard</title>
<script src="https://js.pusher.com/8.2/pusher.min.js"></script>

<style>
body{margin:0;font-family:Segoe UI,Arial;background:#060b18;color:#e5e7eb;display:flex}
.sidebar{width:260px;background:linear-gradient(180deg,#081a3a,#030712);height:100vh;padding:18px 14px;border-right:1px solid rgba(59,130,246,.25)}
.sidebar h2{margin-top:0;color:#60a5fa}
.tab-btn{width:100%;padding:12px;margin-bottom:12px;border:none;border-radius:10px;background:#0a1226;color:white;text-align:left;cursor:pointer}
.tab-btn.active{background:#2563eb}
.main{flex:1;padding:28px}
.tab{display:none;background:#0c1426;padding:26px;border-radius:16px}
.tab.active{display:block}
input,textarea,select{width:100%;padding:8px;margin-bottom:10px;border-radius:6px;border:1px solid #1f2937;background:#020617;color:#fff}
button{padding:8px;border:none;border-radius:6px;background:#1d4ed8;color:white;cursor:pointer;margin:4px 0}
.subtabs{display:flex;gap:10px;margin-bottom:15px}
.subtab-btn{flex:1;padding:8px;border-radius:6px;border:none;background:#111827;color:white;cursor:pointer}
.subtab-btn.active{background:#2563eb}
.scoreBox{font-size:18px;margin-bottom:10px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
th,td{border:1px solid #1f2937;padding:4px;text-align:center}
</style>
</head>
<body>

<div class="sidebar">
<h2>Broadcast</h2>
<button class="tab-btn active" onclick="showTab(event,'match')">Match Setup</button>
<button class="tab-btn" onclick="showTab(event,'livescoring')">Live Scoring</button>
</div>

<div class="main">

<!-- MATCH -->
<div id="match" class="tab active">
<h3>Match Setup</h3>
Team A<input id="teamA">
Team A Players<textarea id="teamAPlayers"></textarea>
Team B<input id="teamB">
Team B Players<textarea id="teamBPlayers"></textarea>
Batting Team<select id="batting"></select>
Innings<select id="innings"><option>1st Innings</option><option>2nd Innings</option></select>
Total Overs<input id="maxOvers" value="20">
Target<input id="target">
<button onclick="sendMatch()">Update Match</button>
</div>

<!-- LIVE SCORING -->
<div id="livescoring" class="tab">

<h3>Live Scoring</h3>

<div class="subtabs">
<button class="subtab-btn active" onclick="showSubTab(event,'basic')">Basic</button>
<button class="subtab-btn" onclick="showSubTab(event,'advanced')">Advanced</button>
</div>

<!-- BASIC -->
<div id="basic" class="subtab active">

<div class="scoreBox">
Score: <span id="liveScore">0/0</span><br>
Overs: <span id="liveOvers">0.0</span><br>
Run Rate: <span id="liveRR">0.00</span><br>
Required Runs: <span id="liveReqRuns">-</span><br>
Required RR: <span id="liveReqRR">-</span>
</div>

<div class="grid">
<button onclick="scoreRun(0)">0</button>
<button onclick="scoreRun(1)">1</button>
<button onclick="scoreRun(2)">2</button>
<button onclick="scoreRun(3)">3</button>
<button onclick="scoreRun(4)">4</button>
<button onclick="scoreRun(6)">6</button>
<button onclick="addWicket()">W</button>
<button onclick="undo()">UNDO</button>
</div>

<h4>Extras</h4>
<button onclick="addExtra('wide')">Wide</button>
<button onclick="addExtra('noball')">No Ball</button>
<button onclick="addExtra('bye')">Bye</button>
<button onclick="addExtra('legbye')">Leg Bye</button>

</div>

<!-- ADVANCED -->
<div id="advanced" class="subtab" style="display:none">

Striker<select id="striker"></select>
Non-Striker<select id="nonStriker"></select>
Bowler<select id="bowler"></select>

<h4>Batsman Stats</h4>
<table>
<thead><tr><th>Name</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
<tbody id="batsmanTable"></tbody>
</table>

<h4>Bowler Stats</h4>
<table>
<thead><tr><th>Name</th><th>O</th><th>R</th><th>W</th><th>Econ</th></tr></thead>
<tbody id="bowlerTable"></tbody>
</table>

</div>

</div>

</div>

<script>
/* ================= ENGINE ================= */

let total=0,wkts=0,balls=0;
let history=[];
let batsmen={},bowlers={};

function overs(){return Math.floor(balls/6)+"."+(balls%6);}
function rr(){return balls?(total/(balls/6)).toFixed(2):"0.00";}

function requiredRuns(){
 if(innings.value!=="2nd Innings"||!target.value) return "-";
 return Math.max(parseInt(target.value)-total,0);
}

function requiredRR(){
 if(innings.value!=="2nd Innings"||!target.value) return "-";
 const ballsLeft=(parseInt(maxOvers.value)*6)-balls;
 const runsLeft=parseInt(target.value)-total;
 if(ballsLeft<=0||runsLeft<=0) return "-";
 return (runsLeft/(ballsLeft/6)).toFixed(2);
}

function updateDisplay(){
 liveScore.innerText=total+"/"+wkts;
 liveOvers.innerText=overs();
 liveRR.innerText=rr();
 liveReqRuns.innerText=requiredRuns();
 liveReqRR.innerText=requiredRR();
 renderTables();
 send('manualScore',{
   score:total+"/"+wkts,
   overs:overs(),
   runRate:rr(),
   requiredRuns:requiredRuns(),
   requiredRR:requiredRR()
 });
}

function ensureBatsman(name){
 if(!batsmen[name]) batsmen[name]={runs:0,balls:0,fours:0,sixes:0};
}

function ensureBowler(name){
 if(!bowlers[name]) bowlers[name]={balls:0,runs:0,wickets:0};
}

function scoreRun(r){
 const s=striker.value;
 const b=bowler.value;
 ensureBatsman(s);
 ensureBowler(b);

 history.push({type:'run',r,striker:s,bowler:b});

 total+=r; balls++;
 batsmen[s].runs+=r;
 batsmen[s].balls++;
 if(r===4)batsmen[s].fours++;
 if(r===6)batsmen[s].sixes++;
 bowlers[b].runs+=r;
 bowlers[b].balls++;

 if(r%2===1) rotateStrike();
 if(balls%6===0) rotateStrike();

 updateDisplay();
}

function addWicket(){
 const s=striker.value;
 const b=bowler.value;
 ensureBatsman(s);
 ensureBowler(b);

 history.push({type:'wicket',striker:s,bowler:b});

 wkts++; balls++;
 batsmen[s].balls++;
 bowlers[b].balls++;
 bowlers[b].wickets++;

 if(balls%6===0) rotateStrike();

 updateDisplay();
}

function addExtra(type){
 const b=bowler.value;
 ensureBowler(b);
 history.push({type:'extra',typeExtra:type,bowler:b});

 total++;
 bowlers[b].runs++;

 if(type==="bye"||type==="legbye"){
   balls++;
   if(balls%6===0) rotateStrike();
 }

 updateDisplay();
}

function undo(){
 const last=history.pop();
 if(!last) return;

 if(last.type==='run'){
   total-=last.r;
   balls--;
   batsmen[last.striker].runs-=last.r;
   batsmen[last.striker].balls--;
   if(last.r===4)batsmen[last.striker].fours--;
   if(last.r===6)batsmen[last.striker].sixes--;
   bowlers[last.bowler].runs-=last.r;
   bowlers[last.bowler].balls--;
 }
 if(last.type==='wicket'){
   wkts--; balls--;
   batsmen[last.striker].balls--;
   bowlers[last.bowler].balls--;
   bowlers[last.bowler].wickets--;
 }
 if(last.type==='extra'){
   total--;
   bowlers[last.bowler].runs--;
   if(last.typeExtra==="bye"||last.typeExtra==="legbye"){
     balls--;
   }
 }

 updateDisplay();
}

function rotateStrike(){
 const temp=striker.value;
 striker.value=nonStriker.value;
 nonStriker.value=temp;
}

function renderTables(){
 batsmanTable.innerHTML='';
 Object.keys(batsmen).forEach(n=>{
   const d=batsmen[n];
   const sr=d.balls?( (d.runs/d.balls)*100 ).toFixed(1):"0.0";
   batsmanTable.innerHTML+=`<tr><td>${n}</td><td>${d.runs}</td><td>${d.balls}</td><td>${d.fours}</td><td>${d.sixes}</td><td>${sr}</td></tr>`;
 });

 bowlerTable.innerHTML='';
 Object.keys(bowlers).forEach(n=>{
   const d=bowlers[n];
   const o=Math.floor(d.balls/6)+"."+(d.balls%6);
   const econ=d.balls?(d.runs/(d.balls/6)).toFixed(2):"0.00";
   bowlerTable.innerHTML+=`<tr><td>${n}</td><td>${o}</td><td>${d.runs}</td><td>${d.wickets}</td><td>${econ}</td></tr>`;
 });
}

/* ================= MATCH BINDING ================= */

function updateBattingTeams(){
 batting.innerHTML='';
 if(teamA.value) batting.add(new Option(teamA.value,teamA.value));
 if(teamB.value) batting.add(new Option(teamB.value,teamB.value));
 updatePlayerLists();
}

function updatePlayerLists(){
 const bat=batting.value;
 let batPlayers=[],bowlPlayers=[];
 if(bat===teamA.value){
   batPlayers=teamAPlayers.value.split('\n');
   bowlPlayers=teamBPlayers.value.split('\n');
 }else{
   batPlayers=teamBPlayers.value.split('\n');
   bowlPlayers=teamAPlayers.value.split('\n');
 }

 striker.innerHTML='';
 nonStriker.innerHTML='';
 bowler.innerHTML='';

 batPlayers.map(p=>p.trim()).filter(Boolean).forEach(p=>{
   striker.add(new Option(p,p));
   nonStriker.add(new Option(p,p));
 });

 bowlPlayers.map(p=>p.trim()).filter(Boolean).forEach(p=>{
   bowler.add(new Option(p,p));
 });
}

teamA.addEventListener('input',updateBattingTeams);
teamB.addEventListener('input',updateBattingTeams);
teamAPlayers.addEventListener('input',updatePlayerLists);
teamBPlayers.addEventListener('input',updatePlayerLists);
batting.addEventListener('change',updatePlayerLists);

/* ================= UI ================= */

function showTab(evt,id){
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 if(evt) evt.target.classList.add('active');
}

function showSubTab(evt,id){
 document.querySelectorAll('.subtab').forEach(t=>t.style.display='none');
 document.getElementById(id).style.display='block';
 document.querySelectorAll('.subtab-btn').forEach(b=>b.classList.remove('active'));
 evt.target.classList.add('active');
}

function sendMatch(){
 send('match',{
   teamA:teamA.value,
   teamB:teamB.value,
   batting:batting.value,
   innings:innings.value,
   teamAPlayers:teamAPlayers.value.split('\n'),
   teamBPlayers:teamBPlayers.value.split('\n')
 });
}

async function send(event,data){
 await fetch('/api/broadcast',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({event,data})
 });
}
</script>

</body>
</html>
